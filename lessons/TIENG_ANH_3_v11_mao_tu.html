<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đấu Trường Anh Ngữ — Lớp 3</title>
<script src="../js/lesson-guard.js" data-course-id="dau-truong-anh-ngu-3"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=Nunito:wght@400;600;700;800;900&display=swap');
  :root{
    --cream:#FBF6EC; --navy:#1F3A5F; --navy-deep:#16294A; --orange:#F2994A;
    --orange-deep:#D97A2B; --green:#6FCF97; --green-deep:#3FA66B; --red:#EB5757;
    --gold:#F2C94C; --ink:#27324A; --paper-line:#E4DCC8; --white:#FFFFFF;
    --purple:#9B59B6; --purple-deep:#7D3C98; --teal:#1ABC9C; --teal-deep:#148F77;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{font-family:'Nunito', sans-serif; background:var(--cream);
    background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 38px,var(--paper-line) 39px),
    radial-gradient(circle at 90% 8%,rgba(242,153,74,0.10),transparent 45%),
    radial-gradient(circle at 8% 92%,rgba(111,207,151,0.12),transparent 45%);
    color:var(--ink); min-height:100vh; display:flex; justify-content:center; padding:24px 14px;}
  body.hard-mode{background-image:repeating-linear-gradient(to bottom,transparent 0px,transparent 38px,rgba(155,89,182,0.12) 39px),
    radial-gradient(circle at 90% 8%,rgba(155,89,182,0.15),transparent 45%),
    radial-gradient(circle at 8% 92%,rgba(26,188,156,0.12),transparent 45%);}
  .app{width:100%; max-width:760px;}
  h1,h2,h3,.display{font-family:'Baloo 2',cursive;}
  .top-card{background:var(--navy); border-radius:22px; padding:18px 20px 22px; color:var(--white);
    box-shadow:0 10px 0 rgba(22,41,74,0.35),0 14px 30px rgba(22,41,74,0.25); margin-bottom:18px; position:relative; overflow:hidden;}
  .top-card.hard-mode-card{background:linear-gradient(135deg,var(--purple-deep),#1a1a4a);}
  .top-card::after{content:""; position:absolute; right:-40px; top:-40px; width:160px; height:160px; border-radius:50%;
    background:radial-gradient(circle,rgba(242,201,76,0.25),transparent 70%);}
  .brand-row{display:flex; align-items:center; justify-content:space-between; margin-bottom:14px;}
  .brand{font-size:1.45rem; font-weight:800; letter-spacing:0.3px; display:flex; align-items:center; gap:8px;}
  .brand .flag{font-size:1.5rem;}
  .score-chip{background:var(--gold); color:var(--navy-deep); font-weight:800; font-family:'Baloo 2',cursive;
    border-radius:999px; padding:6px 14px; font-size:0.95rem; box-shadow:0 3px 0 var(--orange-deep);}
  .stage-track{display:flex; align-items:center; gap:3px; overflow-x:auto; padding-bottom:2px;
    scrollbar-width:thin;}
  .stage-track::-webkit-scrollbar{height:4px;}
  .stage-track::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.25); border-radius:4px;}
  .stage-dot-wrap{display:flex; flex-direction:column; align-items:center; gap:5px; flex:1; min-width:30px;}
  .stage-dot{width:30px; height:30px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-family:'Baloo 2',cursive; font-weight:700; font-size:0.85rem;
    border:3px solid rgba(255,255,255,0.25); background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.55);
    transition:all .35s ease; flex-shrink:0;}
  .stage-dot.done{background:var(--green); border-color:var(--green-deep); color:var(--navy-deep);}
  .stage-dot.current{background:var(--gold); border-color:var(--orange-deep); color:var(--navy-deep);
    transform:scale(1.12); box-shadow:0 0 0 6px rgba(242,201,76,0.18);}
  .stage-dot.clickable-dot{cursor:pointer; transition:transform .15s ease, box-shadow .15s ease;}
  .stage-dot.clickable-dot:hover{transform:scale(1.15); box-shadow:0 0 0 5px rgba(255,255,255,0.18);}
  .stage-dot.clickable-dot:active{transform:scale(1.0);}
  .stage-dot.current.clickable-dot:hover{transform:scale(1.2);}
  .hard-mode-card .stage-dot.done{background:var(--teal); border-color:var(--teal-deep);}
  .hard-mode-card .stage-dot.current{background:var(--purple); border-color:var(--purple-deep);}
  .stage-label{font-size:0.58rem; text-align:center; color:rgba(255,255,255,0.6); line-height:1.1; font-weight:700;
    white-space:nowrap;}
  .stage-label.active-label{color:var(--gold);}
  .stage-line{height:3px; flex:0.5; min-width:10px; background:rgba(255,255,255,0.2); border-radius:2px; margin-top:-20px;}
  .stage-line.done{background:var(--green);}
  .card{background:var(--white); border-radius:22px; border:2px solid #EFE7D2;
    box-shadow:0 8px 0 #EFE7D2,0 12px 26px rgba(31,58,95,0.08); padding:26px 24px;}
  .home .mascot{font-size:4rem; text-align:center; margin-bottom:6px;}
  .home-title-wrap{text-align:center; margin-bottom:10px; padding:18px 24px;
    background:#4a90d9;
    border-radius:18px;
    box-shadow:0 6px 0 rgba(10,30,90,0.35),0 14px 32px rgba(10,30,90,0.18);}
  .home-title-wrap .mascot-inner{font-size:3.6rem; display:block; margin-bottom:8px;
    filter:drop-shadow(0 4px 8px rgba(0,0,0,0.25));}
  .home-title-wrap h1{color:#e8000a !important; font-size:2rem; margin:0 0 6px;
    letter-spacing:1px; font-weight:900; text-shadow:0 2px 6px rgba(0,0,0,0.2);}
  .home-title-wrap p.sub-inner{color:#ffffff; font-weight:700; font-size:0.9rem; margin:0;}
  .home h1{text-align:center; color:var(--navy); font-size:1.9rem; margin-bottom:6px;}
  .home p.sub{text-align:center; color:#7a7363; font-weight:700; margin-bottom:22px;}
  .difficulty-badge{text-align:center; margin-bottom:12px;}
  .difficulty-badge span{display:inline-block; padding:5px 16px; border-radius:999px; font-weight:800; font-size:0.85rem; font-family:'Baloo 2',cursive;}
  .badge-normal{background:#E8F6EE; color:var(--green-deep); border:2px solid var(--green);}
  .badge-hard{background:linear-gradient(90deg,#9B59B6,#7D3C98); color:#fff;}
  .round-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:12px; margin-bottom:22px;}
  .round-pill{border-radius:16px; padding:14px 12px; border:2px solid #EFE7D2; background:#FFFCF4; text-align:left;}
  .round-pill.hard-pill{border-color:#D7BDE2; background:#F9F0FF;}
  .round-pill.clickable{cursor:pointer; transition:all .15s ease; box-shadow:0 4px 0 #EFE7D2;}
  .round-pill.clickable:hover{transform:translateY(-2px); border-color:var(--orange);}
  .round-pill.clickable.hard-pill:hover{border-color:var(--purple);}
  .round-pill.clickable:active{transform:translateY(2px); box-shadow:0 1px 0 #EFE7D2;}
  .round-pill.locked{cursor:not-allowed;}
  .home-mini-btn{background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.4); color:#fff;
    border-radius:999px; padding:5px 12px; font-family:'Baloo 2',cursive; font-weight:700; font-size:0.82rem;
    cursor:pointer; display:inline-flex; align-items:center; gap:5px; transition:all .15s ease;}
  .home-mini-btn:hover{background:rgba(255,255,255,0.28);}
  .home-mini-btn:active{transform:translateY(1px);}
  .sound-btn{background:rgba(255,255,255,0.15); border:2px solid rgba(255,255,255,0.4); color:#fff;
    border-radius:999px; padding:5px 11px; font-family:'Baloo 2',cursive; font-weight:800; font-size:0.82rem;
    cursor:pointer; display:inline-flex; align-items:center; gap:4px; transition:all .15s ease;
    white-space:nowrap;}
  .sound-btn:hover{background:rgba(255,255,255,0.28);}
  .sound-btn:active{transform:translateY(1px);}
  .sound-btn.muted{opacity:0.6; text-decoration:line-through;}
  .round-pill .rn{font-family:'Baloo 2',cursive; font-weight:800; color:var(--orange-deep); font-size:0.78rem; text-transform:uppercase;}
  .round-pill.hard-pill .rn{color:var(--purple-deep);}
  .round-pill .rt{font-weight:800; color:var(--navy); font-size:0.95rem; margin-top:2px;}
  .round-pill .rd{font-size:0.74rem; color:#9a9384; font-weight:700; margin-top:2px;}
  .btn{display:block; width:100%; border:none; border-radius:16px; padding:16px; font-family:'Baloo 2',cursive;
    font-weight:700; font-size:1.15rem; cursor:pointer; transition:transform .12s ease,box-shadow .12s ease;}
  .btn:active{transform:translateY(3px);}
  .btn-primary{background:var(--orange); color:var(--white); box-shadow:0 6px 0 var(--orange-deep);}
  .btn-primary:active{box-shadow:0 2px 0 var(--orange-deep);}
  .btn-hard{background:linear-gradient(135deg,var(--purple),var(--purple-deep)); color:var(--white); box-shadow:0 6px 0 #5B2C6F;}
  .btn-hard:active{box-shadow:0 2px 0 #5B2C6F;}
  .btn-teal{background:var(--teal); color:var(--white); box-shadow:0 6px 0 var(--teal-deep);}
  .btn-teal:active{box-shadow:0 2px 0 var(--teal-deep);}
  .btn-secondary{background:var(--white); color:var(--navy); border:2px solid var(--navy); box-shadow:0 6px 0 #d8d2c0; margin-top:12px;}
  .btn-secondary:active{box-shadow:0 2px 0 #d8d2c0;}
  .btn:disabled{background:#d8d2c0; color:#a39d8c; box-shadow:0 6px 0 #c5bfae; cursor:not-allowed;}
  .quiz-meta{display:flex; justify-content:center; align-items:center; margin-bottom:14px;}
  .meta-chip{font-family:'Baloo 2',cursive; font-weight:700; font-size:0.88rem; background:#FFF3E0;
    color:var(--orange-deep); border-radius:999px; padding:5px 12px;}
  .meta-chip.hard{background:#F4E6FF; color:var(--purple-deep);}
  .progress-bar-outer{height:10px; background:#F0EBDB; border-radius:999px; overflow:hidden; margin-bottom:18px;}
  .progress-bar-inner{height:100%; background:linear-gradient(90deg,var(--green),var(--green-deep));
    border-radius:999px; transition:width .4s ease;}
  .progress-bar-inner.hard{background:linear-gradient(90deg,var(--purple),var(--purple-deep));}
  .question-box{background:#FFFCF4; border-radius:18px; border:2px dashed #E9DFC4;
    padding:20px 18px; margin:14px 0 18px; text-align:center;}
  .question-box.hard{background:#F9F0FF; border-color:#D7BDE2;}
  .q-count{font-size:0.78rem; font-weight:800; color:#b0a890; text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px;}
  .q-text{font-size:1.32rem; font-weight:800; color:var(--navy); line-height:1.4;}
  .q-trans{font-size:0.92rem; font-weight:700; color:#8a7f63; line-height:1.4; margin-top:8px;
    font-family:'Nunito', sans-serif; font-style:italic;}
  .q-trans::before{content:"🇻🇳 "; font-style:normal;}
  .options{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
  .opt{border-radius:16px; border:2px solid #EFE7D2; background:var(--white); padding:14px 12px;
    font-weight:800; font-size:1.02rem; color:var(--navy); cursor:pointer; text-align:center;
    transition:all .15s ease; box-shadow:0 4px 0 #EFE7D2; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:4px; font-family:inherit;}
  .opt .opt-en{line-height:1.3;}
  .opt .opt-vi{font-size:0.74rem; font-weight:700; color:#a39a86; font-style:italic;
    line-height:1.25; font-family:'Nunito', sans-serif;}
  .opt.correct .opt-vi{color:rgba(255,255,255,0.85);}
  .opt.wrong .opt-vi{color:rgba(255,255,255,0.85);}
  .opt:hover{transform:translateY(-2px); border-color:var(--orange);}
  .opt.hard-opt:hover{border-color:var(--purple);}
  .opt:active{transform:translateY(2px);}
  .opt.correct{background:var(--green); border-color:var(--green-deep); color:white;
    box-shadow:0 4px 0 var(--green-deep); animation:pop .3s ease;}
  .opt.wrong{background:var(--red); border-color:#C0392B; color:white; box-shadow:0 4px 0 #C0392B; animation:shake .35s ease;}
  .opt.disabled{pointer-events:none; opacity:0.55;}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.06)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .feedback-banner{text-align:center; font-family:'Baloo 2',cursive; font-weight:800; font-size:1.1rem;
    border-radius:14px; padding:12px; margin-top:14px; display:none;}
  .feedback-banner.show{display:block; animation:slideUp .25s ease;}
  .feedback-banner.ok{background:#E8F6EE; color:var(--green-deep);}
  .feedback-banner.bad{background:#FDEDEC; color:#C0392B;}
  @keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .result .medal{font-size:4.2rem; text-align:center; margin-bottom:8px; animation:medalIn .5s ease;}
  @keyframes medalIn{0%{transform:scale(0) rotate(-30deg);opacity:0;}70%{transform:scale(1.15) rotate(8deg);opacity:1;}100%{transform:scale(1) rotate(0deg);}}
  .result h2{text-align:center; color:var(--navy); font-size:1.7rem; margin-bottom:4px;}
  .result .result-sub{text-align:center; font-weight:700; color:#8a8370; margin-bottom:20px;}
  .stat-row{display:flex; gap:10px; margin-bottom:20px;}
  .stat-box{flex:1; background:#FFFCF4; border:2px solid #EFE7D2; border-radius:14px; padding:12px 8px; text-align:center;}
  .stat-box .num{font-family:'Baloo 2',cursive; font-size:1.4rem; font-weight:800; color:var(--orange-deep);}
  .stat-box .lab{font-size:0.68rem; font-weight:800; color:#a39d8c; text-transform:uppercase;}
  .stars{text-align:center; font-size:2rem; margin-bottom:18px; letter-spacing:4px;}
  .fail-box{background:#FDEDEC; border:2px solid #F6C9C6; border-radius:16px; padding:16px; text-align:center; margin-bottom:18px;}
  .fail-box .ft{font-family:'Baloo 2',cursive; font-weight:800; color:#C0392B; margin-bottom:4px;}
  .fail-box .fd{font-size:0.88rem; color:#a05049; font-weight:700;}
  .final-medal-grid{display:flex; justify-content:center; gap:8px; margin:14px 0 20px; flex-wrap:wrap;}
  .final-medal{width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;
    font-size:1.3rem; background:#F0EBDB; border:2px solid #E4DCC8;}
  .final-medal.got{background:linear-gradient(135deg,var(--gold),var(--orange)); border-color:var(--orange-deep);}
  .final-medal.got.hard{background:linear-gradient(135deg,var(--purple),var(--teal)); border-color:var(--purple-deep);}
  .levelup-screen{text-align:center; padding:10px 0;}
  .levelup-anim{font-size:5rem; animation:bounce 0.8s ease infinite alternate; display:block; margin-bottom:8px;}
  @keyframes bounce{from{transform:translateY(0) scale(1);}to{transform:translateY(-12px) scale(1.05);}}
  .levelup-screen h2{color:var(--purple-deep); font-size:2rem; margin-bottom:6px;}
  .levelup-screen .levelup-sub{color:#7a7363; font-weight:700; font-size:1rem; margin-bottom:24px; line-height:1.5;}
  .difficulty-choice{display:grid; grid-template-columns:1fr 1fr; gap:14px; margin-bottom:18px;}
  .diff-card{border-radius:18px; padding:20px 14px; border:3px solid transparent; cursor:pointer; transition:transform .15s,border-color .15s,box-shadow .15s;}
  .diff-card:hover{transform:translateY(-3px);}
  .diff-card.normal-diff{background:#E8F6EE; border-color:var(--green);}
  .diff-card.normal-diff:hover{border-color:var(--green-deep); box-shadow:0 6px 20px rgba(63,166,107,0.25);}
  .diff-card.hard-diff{background:linear-gradient(135deg,#F4E6FF,#E8F0FF); border-color:var(--purple);}
  .diff-card.hard-diff:hover{border-color:var(--purple-deep); box-shadow:0 6px 20px rgba(155,89,182,0.3);}
  .diff-icon{font-size:2.2rem; margin-bottom:8px;}
  .diff-title{font-family:'Baloo 2',cursive; font-weight:800; font-size:1.1rem; margin-bottom:4px;}
  .diff-desc{font-size:0.78rem; font-weight:700; color:#7a7363; line-height:1.4;}
  .diff-tag{display:inline-block; margin-top:8px; padding:3px 10px; border-radius:999px; font-size:0.7rem; font-weight:800;}
  .diff-tag.easy{background:var(--green); color:white;}
  .diff-tag.hard-tag{background:var(--purple-deep); color:white;}
  .small-note{text-align:center; font-size:0.74rem; color:#b0a890; font-weight:700; margin-top:14px;}
  .hidden{display:none !important;}
  @media (max-width:480px){.options{grid-template-columns:1fr;} .q-text{font-size:1.12rem;} .q-trans{font-size:0.84rem;} .opt .opt-vi{font-size:0.7rem;}
    .stage-label{display:none;} .brand{font-size:1.2rem;} .difficulty-choice{grid-template-columns:1fr;}}
</style>
</head>

<div class="app" id="app"></div>

oạn văn: \"Hôm nay là Chủ Nhật. Mai và gia đình đi công viên. Họ đi picnic.\" — Họ đi đâu?", "\"Nam has three pets: a cat, a dog, and a bird.\" — How many pets does Nam have?": "Đọc đoạn văn: \"Nam có ba con vật nuôi: một con mèo, một con chó và một con chim.\" — Nam có bao nhiêu vật nuôi?", "\"My classroom is on the second floor. It is clean and bright.\" — Where is the classroom?": "Đọc đoạn văn: \"Lớp học của tôi ở tầng hai. Nó sạch sẽ và sáng sủa.\" — Lớp học ở đâu?", "\"Today is my birthday. I am ten years old. I have a big cake.\" — What does she/he have?": "Đọc đoạn văn: \"Hôm nay là sinh nhật tôi. Tôi 10 tuổi. Tôi có một cái bánh kem lớn.\" — Người đó có gì?", "\"The weather is cold today. I wear a warm coat.\" — What does the person wear?": "Đọc đoạn văn: \"Hôm nay trời lạnh. Tôi mặc một cái áo khoác ấm.\" — Người đó mặc gì?", "\"Hoa is nine years old. She lives in Ho Chi Minh City. She loves reading books.\" — What does Hoa love?": "Đọc đoạn văn: \"Hoa 9 tuổi. Hoa sống ở Thành phố Hồ Chí Minh. Hoa thích đọc sách.\" — Hoa thích làm gì?", "\"Hoa is nine years old. She lives in Ho Chi Minh City.\" — Where does Hoa live?": "Đọc đoạn văn: \"Hoa 9 tuổi. Hoa sống ở Thành phố Hồ Chí Minh.\" — Hoa sống ở đâu?", "\"My dog is named Lucky. He is brown and very playful.\" — What is the dog's name?": "Đọc đoạn văn: \"Con chó của tôi tên là Lucky. Nó màu nâu và rất hiếu động.\" — Tên con chó là gì?", "\"My dog is named Lucky. He is brown and very playful.\" — What color is Lucky?": "Đọc đoạn văn: \"Con chó của tôi tên là Lucky. Nó màu nâu và rất hiếu động.\" — Lucky màu gì?", "\"The school bell rings at 7:30. All students go to class.\" — What time does the bell ring?": "Đọc đoạn văn: \"Chuông trường reo lúc 7:30. Tất cả học sinh vào lớp.\" — Chuông reo lúc mấy giờ?", "\"Ann has red hair and blue eyes. She is from England.\" — Where is Ann from?": "Đọc đoạn văn: \"Ann có tóc đỏ và mắt xanh. Cô ấy đến từ nước Anh.\" — Ann đến từ đâu?", "\"We play football on Saturdays. Our team has eleven players.\" — How many players?": "Đọc đoạn văn: \"Chúng tôi chơi bóng đá vào thứ Bảy. Đội của chúng tôi có 11 cầu thủ.\" — Có bao nhiêu cầu thủ?", "\"There are thirty students in my class. Twenty are girls.\" — How many boys are in the class?": "Đọc đoạn văn: \"Lớp tôi có 30 học sinh. 20 là học sinh nữ.\" — Có bao nhiêu học sinh nam trong lớp?", "\"The cat sleeps in the day and plays at night.\" — When does the cat sleep?": "Đọc đoạn văn: \"Con mèo ngủ vào ban ngày và chơi vào ban đêm.\" — Con mèo ngủ khi nào?", "\"Minh's mother is a nurse. She works at a big hospital.\" — What is Minh's mother?": "Đọc đoạn văn: \"Mẹ của Minh là y tá. Mẹ làm việc ở một bệnh viện lớn.\" — Mẹ của Minh làm nghề gì?", "\"Our school has a library. It has five hundred books.\" — How many books?": "Đọc đoạn văn: \"Trường chúng tôi có một thư viện. Thư viện có 500 cuốn sách.\" — Có bao nhiêu cuốn sách?", "\"Mary has two younger brothers. She helps them with homework.\" — What does Mary help with?": "Đọc đoạn văn: \"Mary có hai em trai. Cô giúp các em làm bài tập.\" — Mary giúp gì cho các em?", "\"In summer, it is very hot. Children love to swim in the pool.\" — What do children love to do?": "Đọc đoạn văn: \"Vào mùa hè, trời rất nóng. Trẻ em thích bơi ở bể bơi.\" — Trẻ em thích làm gì?", "\"My father wakes up at six o'clock every day.\" — What time does the father wake up?": "Đọc đoạn văn: \"Bố tôi thức dậy lúc 6 giờ mỗi ngày.\" — Bố thức dậy lúc mấy giờ?", "\"The bird sings in the morning. It is very beautiful.\" — When does the bird sing?": "Đọc đoạn văn: \"Con chim hót vào buổi sáng. Tiếng hót rất hay.\" — Con chim hót khi nào?", "\"Ben has a ruler and two pencils in his pencil case.\" — How many pencils?": "Đọc đoạn văn: \"Ben có một cái thước và hai cái bút chì trong hộp bút.\" — Có bao nhiêu bút chì?", "\"It is raining. Peter stays at home and reads a comic book.\" — What does Peter read?": "Đọc đoạn văn: \"Trời đang mưa. Peter ở nhà và đọc truyện tranh.\" — Peter đọc gì?", "\"The farmer has ten cows and six chickens on his farm.\" — How many cows?": "Đọc đoạn văn: \"Người nông dân có 10 con bò và 6 con gà ở trang trại.\" — Có bao nhiêu con bò?", "\"Lan's family eats dinner together at seven every evening.\" — What time do they eat dinner?": "Đọc đoạn văn: \"Gia đình Lan ăn tối cùng nhau lúc 7 giờ mỗi tối.\" — Họ ăn tối lúc mấy giờ?", "\"The library is open Monday to Friday. It is closed on weekends.\" — When is the library closed?": "Đọc đoạn văn: \"Thư viện mở từ thứ Hai đến thứ Sáu. Đóng cửa vào cuối tuần.\" — Thư viện đóng cửa khi nào?", "\"Tim likes drawing animals. His favourite animal is a horse.\" — What is Tim's favourite animal?": "Đọc đoạn văn: \"Tim thích vẽ các con vật. Con vật yêu thích của Tim là con ngựa.\" — Con vật yêu thích của Tim là gì?", "\"We have four seasons: spring, summer, autumn, and winter.\" — How many seasons are there?": "Đọc đoạn văn: \"Chúng ta có bốn mùa: xuân, hạ, thu, đông.\" — Có bao nhiêu mùa?", "\"The bus arrives at school at quarter past seven.\" — What time does the bus arrive?": "Đọc đoạn văn: \"Xe buýt đến trường lúc 7 giờ 15.\" — Xe buýt đến lúc mấy giờ?", "\"Dan and Kim are twins. They are both eight years old.\" — How old are Dan and Kim?": "Đọc đoạn văn: \"Dan và Kim là cặp song sinh. Cả hai đều 8 tuổi.\" — Dan và Kim bao nhiêu tuổi?", "\"My pencil case has two pens, three pencils, and one eraser.\" — How many pens are in the pencil case?": "Đọc đoạn văn: \"Hộp bút của tôi có 2 cái bút mực, 3 cái bút chì và 1 cái tẩy.\" — Có bao nhiêu cái bút mực trong hộp bút?", "Choose the correct sentence.": "Chọn câu đúng.", "\"What ___ you doing now?\" — \"I am reading.\"": "Điền vào chỗ trống: \"What ___ you doing now?\" — \"I am reading.\" (Bạn đang làm gì? — Tôi đang đọc sách.)", "Choose the plural form of 'book'.": "Chọn dạng số nhiều của từ 'book' (cuốn sách).", "Choose the plural form of 'box'.": "Chọn dạng số nhiều của từ 'box' (cái hộp).", "\"I ___ to school every day.\" choose the correct verb.": "Chọn động từ đúng: \"I ___ to school every day.\" (Tôi đi học mỗi ngày.)", "\"She ___ to school every day.\" choose the correct verb.": "Chọn động từ đúng: \"She ___ to school every day.\" (Cô ấy đi học mỗi ngày.)", "Which word means 'con voi'?": "Từ nào có nghĩa là 'con voi'?", "Which word means 'bầu trời'?": "Từ nào có nghĩa là 'bầu trời'?", "Choose the opposite of 'big'.": "Chọn từ trái nghĩa với 'big' (to lớn).", "Choose the opposite of 'hot'.": "Chọn từ trái nghĩa với 'hot' (nóng).", "\"There ___ two birds in the tree.\"": "Điền vào chỗ trống: \"There ___ two birds in the tree.\" (Có hai con chim trên cây.)", "\"There ___ a cat under the chair.\"": "Điền vào chỗ trống: \"There ___ a cat under the chair.\" (Có một con mèo dưới ghế.)", "\"___ is your birthday?\" — \"It's in May.\"": "Điền vào chỗ trống: \"___ is your birthday?\" — \"It's in May.\" (Sinh nhật bạn là khi nào? — Vào tháng Năm.)", "\"___ is your teacher?\" — \"She's Miss Hoa.\"": "Điền vào chỗ trống: \"___ is your teacher?\" — \"She's Miss Hoa.\" (Giáo viên của bạn là ai? — Là cô Hoa.)", "\"He can ___ very fast.\" choose the correct verb.": "Chọn động từ đúng: \"He can ___ very fast.\" (Anh ấy có thể ... rất nhanh.)", "Choose the plural of 'child'.": "Chọn dạng số nhiều của từ 'child' (trẻ em).", "Which word means 'buổi sáng'?": "Từ nào có nghĩa là 'buổi sáng'?", "\"I ___ lunch at school.\" — choose the correct form.": "Chọn dạng đúng: \"I ___ lunch at school.\" (Tôi ăn trưa ở trường.)", "Choose the opposite of 'near'.": "Chọn từ trái nghĩa với 'near' (gần).", "\"My father ___ TV every evening.\"": "Điền vào chỗ trống: \"My father ___ TV every evening.\" (Bố tôi xem TV mỗi tối.)", "\"The pen is ___ the desk.\" — choose preposition.": "Chọn giới từ đúng: \"The pen is ___ the desk.\" (Cái bút ở ... cái bàn.)", "\"___ do you go to school?\" — \"By bus.\"": "Điền vào chỗ trống: \"___ do you go to school?\" — \"By bus.\" (Bạn đi học bằng gì? — Bằng xe buýt.)", "Choose the plural of 'tooth'.": "Chọn dạng số nhiều của từ 'tooth' (cái răng).", "Which word means 'mùa hè'?": "Từ nào có nghĩa là 'mùa hè'?", "\"She ___ a beautiful dress today.\"": "Điền vào chỗ trống: \"She ___ a beautiful dress today.\" (Hôm nay cô ấy ... một chiếc váy đẹp.)", "\"___ umbrella is in the bag.\" — correct article.": "Chọn mạo từ đúng: \"___ umbrella is in the bag.\" (Cái dù ở trong túi.)", "\"___ are your shoes?\" — \"They are under the bed.\"": "Điền vào chỗ trống: \"___ are your shoes?\" — \"They are under the bed.\" (Giày của bạn ở đâu? — Ở dưới giường.)", "Choose the opposite of 'day'.": "Chọn từ trái nghĩa với 'day' (ngày).", "\"We ___ football every Sunday.\"": "Điền vào chỗ trống: \"We ___ football every Sunday.\" (Chúng tôi chơi bóng đá mỗi Chủ Nhật.)", "\"There ___ many flowers in the garden.\"": "Điền vào chỗ trống: \"There ___ many flowers in the garden.\" (Có nhiều hoa trong vườn.)", "Choose the correct article: '___ honest person always tells the truth.'": "Chọn mạo từ đúng: '___ honest person always tells the truth.' (Một người trung thực luôn nói sự thật.)", "Which word means 'trường học'?": "Từ nào có nghĩa là 'trường học'?", "\"My cat ___ milk every morning.\"": "Điền vào chỗ trống: \"My cat ___ milk every morning.\" (Con mèo của tôi uống sữa mỗi sáng.)", "Choose the opposite of 'fast'.": "Chọn từ trái nghĩa với 'fast' (nhanh).", "\"There ___ some water in the glass.\"": "Điền vào chỗ trống: \"There ___ some water in the glass.\" (Có một ít nước trong cốc.)", "Which word is a VERB?": "Từ nào là động từ (VERB)?", "Which word is an ADJECTIVE?": "Từ nào là tính từ (ADJECTIVE)?", "Which word is a NOUN?": "Từ nào là danh từ (NOUN)?", "'Bookshop' means:": "'Bookshop' có nghĩa là:", "'Sunshine' means:": "'Sunshine' có nghĩa là:", "What does 'playground' mean?": "'Playground' có nghĩa là gì?", "What does 'toothbrush' mean?": "'Toothbrush' có nghĩa là gì?", "Which word is the OPPOSITE of 'tall'?": "Từ nào trái nghĩa với 'tall' (cao)?", "Which word is the OPPOSITE of 'open'?": "Từ nào trái nghĩa với 'open' (mở)?", "Which word is the OPPOSITE of 'clean'?": "Từ nào trái nghĩa với 'clean' (sạch)?", "'Bedroom' refers to:": "'Bedroom' nghĩa là:", "Which group has only ANIMALS?": "Nhóm nào chỉ gồm các CON VẬT?", "Which group has only FOOD?": "Nhóm nào chỉ gồm THỨC ĂN?", "Which group has only SCHOOL THINGS?": "Nhóm nào chỉ gồm ĐỒ DÙNG HỌC TẬP?", "Which word goes with 'swim'? (place to swim)": "Từ nào đi cùng với 'swim' (bơi)? (nơi để bơi)", "'Raincoat' is used when:": "'Raincoat' (áo mưa) được dùng khi:", "What does 'midnight' mean?": "'Midnight' có nghĩa là gì?", "Which is a FRUIT?": "Đâu là một loại TRÁI CÂY?", "Which is a VEGETABLE?": "Đâu là một loại RAU?", "What does 'upstairs' mean?": "'Upstairs' có nghĩa là gì?", "Which is NOT a body part?": "Đâu KHÔNG phải là một bộ phận cơ thể?", "Which word rhymes with 'night'?": "Từ nào vần (đọc giống âm cuối) với 'night'?", "Which word rhymes with 'cake'?": "Từ nào vần (đọc giống âm cuối) với 'cake'?", "What does a 'librarian' do?": "'Librarian' (thủ thư) làm công việc gì?", "'Sunrise' happens:": "'Sunrise' (mặt trời mọc) xảy ra:", "What is 'stationery'?": "'Stationery' (văn phòng phẩm) là gì?", "Which word means 'very big'?": "Từ nào có nghĩa là 'rất lớn'?", "Which word means 'very small'?": "Từ nào có nghĩa là 'rất nhỏ'?", "'Supermarket' is a place to:": "'Supermarket' (siêu thị) là nơi để:", "'She runs ___.' — which word fits?": "'She runs ___.' (Cô ấy chạy ...) — từ nào phù hợp?", "'Sandcastle' is made of:": "'Sandcastle' (lâu đài cát) được làm bằng:", "What does 'homesick' mean?": "'Homesick' có nghĩa là gì?", "Which word is an ADVERB?": "Từ nào là trạng từ (ADVERB)?", "'Waterfall' is:": "'Waterfall' (thác nước) là:", "Which word does NOT rhyme with 'bear'?": "Từ nào KHÔNG vần với 'bear'?", "\"I ___ (read) a book right now.\"": "Điền vào chỗ trống (chia động từ 'read'): \"I ___ a book right now.\" (Tôi đang đọc sách ngay lúc này.)", "\"She ___ (eat) breakfast every morning.\"": "Điền vào chỗ trống (chia động từ 'eat'): \"She ___ breakfast every morning.\" (Cô ấy ăn sáng mỗi buổi sáng.)", "\"They ___ (play) football at the moment.\"": "Điền vào chỗ trống (chia động từ 'play'): \"They ___ football at the moment.\" (Họ đang chơi bóng đá lúc này.)", "\"He ___ (not like) vegetables.\"": "Điền vào chỗ trống (chia động từ phủ định 'not like'): \"He ___ vegetables.\" (Anh ấy không thích rau.)", "\"___ she ___ (walk) to school now?\"": "Điền vào chỗ trống (câu hỏi, chia động từ 'walk'): \"___ she ___ to school now?\" (Cô ấy có đang đi bộ đến trường không?)", "'The cat is ___ the box.' — correct preposition:": "Chọn giới từ đúng: 'The cat is ___ the box.' (Con mèo ở ... cái hộp.)", "'The bird is ___ the tree.' — correct preposition:": "Chọn giới từ đúng: 'The bird is ___ the tree.' (Con chim ở ... cái cây.)", "'We go to school ___ 7 AM.' — correct preposition:": "Chọn giới từ đúng: 'We go to school ___ 7 AM.' (Chúng tôi đi học vào 7 giờ sáng.)", "'He was born ___ Monday.' — correct preposition:": "Chọn giới từ đúng: 'He was born ___ Monday.' (Anh ấy sinh vào thứ Hai.)", "'She lives ___ Ho Chi Minh City.' — correct preposition:": "Chọn giới từ đúng: 'She lives ___ Ho Chi Minh City.' (Cô ấy sống ở Thành phố Hồ Chí Minh.)", "\"My dad ___ (work) at the hospital.\" (general fact)": "Điền vào chỗ trống (sự thật chung, chia động từ 'work'): \"My dad ___ at the hospital.\" (Bố tôi làm việc ở bệnh viện.)", "\"Look! The children ___ (swim) in the pool.\"": "Điền vào chỗ trống (chia động từ 'swim'): \"Look! The children ___ in the pool.\" (Nhìn! Các em đang bơi ở bể bơi.)", "\"We ___ English and Maths on Mondays.\"": "Điền vào chỗ trống: \"We ___ English and Maths on Mondays.\" (Chúng tôi học Tiếng Anh và Toán vào thứ Hai.)", "\"___ your sister like cats?\"": "Điền vào chỗ trống: \"___ your sister like cats?\" (Em gái bạn có thích mèo không?)", "\"I ___ (not know) the answer.\"": "Điền vào chỗ trống (chia động từ phủ định 'not know'): \"I ___ the answer.\" (Tôi không biết câu trả lời.)", "'She listens to music ___ the evening.' — correct preposition:": "Chọn giới từ đúng: 'She listens to music ___ the evening.' (Cô ấy nghe nhạc vào buổi tối.)", "'Every day he ___ up at six.' — correct form:": "Chọn dạng đúng: 'Every day he ___ up at six.' (Mỗi ngày anh ấy dậy lúc 6 giờ.)", "\"The teacher ___ a story now.\"": "Điền vào chỗ trống: \"The teacher ___ a story now.\" (Cô giáo đang kể một câu chuyện.)", "\"We ___ lunch at school.\" — correct form:": "Chọn dạng đúng: \"We ___ lunch at school.\" (Chúng tôi ăn trưa ở trường.)", "\"What time ___ the bus arrive?\"": "Điền vào chỗ trống: \"What time ___ the bus arrive?\" (Xe buýt đến lúc mấy giờ?)", "\"They ___ not watching TV at the moment.\"": "Điền vào chỗ trống: \"They ___ not watching TV at the moment.\" (Họ không xem TV lúc này.)", "\"She always ___ her homework before dinner.\"": "Điền vào chỗ trống: \"She always ___ her homework before dinner.\" (Cô ấy luôn làm bài tập trước khi ăn tối.)", "'I was born ___ 2016.' — correct preposition:": "Chọn giới từ đúng: 'I was born ___ 2016.' (Tôi sinh vào năm 2016.)", "\"___ you understand the question?\" — \"Yes, I do.\"": "Điền vào chỗ trống: \"___ you understand the question?\" — \"Yes, I do.\" (Bạn có hiểu câu hỏi không? — Có.)", "\"The sun ___ in the east.\" (general fact)": "Điền vào chỗ trống (sự thật chung): \"The sun ___ in the east.\" (Mặt trời mọc ở hướng đông.)", "\"He is ___ his homework right now.\"": "Điền vào chỗ trống: \"He is ___ his homework right now.\" (Anh ấy đang làm bài tập ngay lúc này.)", "'She is good ___ maths.' — correct preposition:": "Chọn giới từ đúng: 'She is good ___ maths.' (Cô ấy học giỏi môn Toán.)", "\"Look at Lan! She ___ her new dress.\"": "Điền vào chỗ trống: \"Look at Lan! She ___ her new dress.\" (Nhìn Lan! Cô ấy đang mặc chiếc váy mới.)", "\"___ they like oranges?\" — \"Yes, they do.\"": "Điền vào chỗ trống: \"___ they like oranges?\" — \"Yes, they do.\" (Họ có thích cam không? — Có.)", "\"My cat ___ (sleep) a lot every day.\"": "Điền vào chỗ trống (chia động từ 'sleep'): \"My cat ___ a lot every day.\" (Con mèo của tôi ngủ rất nhiều mỗi ngày.)", "\"Right now the students ___ a test.\"": "Điền vào chỗ trống: \"Right now the students ___ a test.\" (Ngay lúc này các học sinh đang làm bài kiểm tra.)", "\"She ___ (not speak) French.\"": "Điền vào chỗ trống (chia động từ phủ định 'not speak'): \"She ___ French.\" (Cô ấy không nói được tiếng Pháp.)", "'He plays basketball ___ Saturdays.' — preposition:": "Chọn giới từ đúng: 'He plays basketball ___ Saturdays.' (Anh ấy chơi bóng rổ vào các ngày thứ Bảy.)", "\"What ___ you doing after school?\" — \"I am going home.\"": "Điền vào chỗ trống: \"What ___ you doing after school?\" — \"I am going home.\" (Bạn sẽ làm gì sau khi tan học? — Tôi sẽ về nhà.)", "\"The baby ___ (sleep) now. Be quiet!\"": "Điền vào chỗ trống (chia động từ 'sleep'): \"The baby ___ now. Be quiet!\" (Em bé đang ngủ. Hãy im lặng!)", "A person who fights fires is called a ___.": "Người chữa cháy được gọi là ___.", "A person who flies a plane is called a ___.": "Người lái máy bay được gọi là ___.", "A person who cooks in a restaurant is called a ___.": "Người nấu ăn trong nhà hàng được gọi là ___.", "A person who fixes your teeth is a ___.": "Người chữa răng cho bạn là một ___.", "A person who takes care of animals is a ___.": "Người chăm sóc động vật là một ___.", "Where do we buy medicine?": "Chúng ta mua thuốc ở đâu?", "Where do planes land and take off?": "Máy bay hạ cánh và cất cánh ở đâu?", "Where do trains stop?": "Tàu hỏa dừng ở đâu?", "Where do you go to borrow books?": "Bạn đến đâu để mượn sách?", "Where do artists display their paintings?": "Các họa sĩ trưng bày tranh của họ ở đâu?", "Which adjective describes something that makes you laugh?": "Tính từ nào miêu tả thứ gì đó khiến bạn cười?", "Which adjective describes a very cold temperature?": "Tính từ nào miêu tả nhiệt độ rất lạnh?", "'Enormous' means:": "'Enormous' có nghĩa là:", "'Ancient' means:": "'Ancient' có nghĩa là:", "'Quiet' describes something that:": "'Quiet' miêu tả thứ gì đó:", "A 'uniform' is:": "'Uniform' (đồng phục) là:", "What does a 'gardener' do?": "'Gardener' (người làm vườn) làm công việc gì?", "'Cloudy' weather means:": "Thời tiết 'cloudy' (nhiều mây) có nghĩa là:", "A 'bakery' is a place where:": "'Bakery' (tiệm bánh) là nơi:", "What is a 'stadium'?": "'Stadium' (sân vận động) là gì?", "'Delicious' describes:": "'Delicious' (ngon) miêu tả:", "'Patient' means:": "'Patient' có nghĩa là:", "Where do you sleep when you travel?": "Bạn ngủ ở đâu khi đi du lịch?", "What does an 'electrician' do?": "'Electrician' (thợ điện) làm công việc gì?", "'Pollution' means:": "'Pollution' (ô nhiễm) có nghĩa là:", "'Generous' describes someone who:": "'Generous' miêu tả người mà:", "What is a 'submarine'?": "'Submarine' (tàu ngầm) là gì?", "'Curious' means:": "'Curious' có nghĩa là:", "A 'journalist' is someone who:": "'Journalist' (nhà báo) là người mà:", "'Exhausted' means:": "'Exhausted' có nghĩa là:", "A 'mechanic' fixes:": "'Mechanic' (thợ máy) sửa chữa:", "'Transparent' means you can:": "'Transparent' (trong suốt) có nghĩa là bạn có thể:", "A 'vegetarian' is someone who:": "'Vegetarian' (người ăn chay) là người mà:", "'Humid' weather is:": "Thời tiết 'humid' (ẩm ướt) là:", "Where do you go to watch movies?": "Bạn đến đâu để xem phim?", "You want to borrow a pen. You say:": "Bạn muốn mượn một cái bút. Bạn nói:", "You don't understand something. You say:": "Bạn không hiểu điều gì đó. Bạn nói:", "Someone says 'Thank you'. You reply:": "Ai đó nói 'Cảm ơn'. Bạn đáp lại:", "You meet someone for the first time. You say:": "Bạn gặp ai đó lần đầu tiên. Bạn nói:", "You want to know the time. You ask:": "Bạn muốn biết giờ. Bạn hỏi:", "You are lost. You need help. You say:": "Bạn bị lạc đường. Bạn cần giúp đỡ. Bạn nói:", "The teacher says you can go to the toilet. She says:": "Cô giáo nói rằng bạn có thể đi vệ sinh. Cô ấy nói:", "Someone gives you a gift. You say:": "Ai đó cho bạn một món quà. Bạn nói:", "You want to sit next to someone. You ask:": "Bạn muốn ngồi cạnh ai đó. Bạn hỏi:", "You feel sick at school. You tell the teacher:": "Bạn cảm thấy không khỏe ở trường. Bạn nói với cô giáo:", "At a restaurant you want to order. You say:": "Tại nhà hàng bạn muốn đặt món. Bạn nói:", "You're late for school. You say to the teacher:": "Bạn đi học muộn. Bạn nói với cô giáo:", "You want to know someone's phone number. You ask:": "Bạn muốn biết số điện thoại của ai đó. Bạn hỏi:", "Someone is sad. You ask:": "Ai đó đang buồn. Bạn hỏi:", "You want to know how to spell a word. You ask:": "Bạn muốn biết cách đánh vần một từ. Bạn hỏi:", "On the phone: Lan is not home. You say:": "Khi gọi điện: Lan không có ở nhà. Bạn nói:", "You want to suggest an activity. You say:": "Bạn muốn đề xuất một hoạt động. Bạn nói:", "At a shop something costs 20,000 dong. You say the price:": "Tại cửa hàng, món đồ có giá 20.000 đồng. Bạn nói giá tiền:", "You want to leave a place politely. You say:": "Bạn muốn rời khỏi một nơi một cách lịch sự. Bạn nói:", "Your teacher asks: 'Any questions?' — You do have one. You say:": "Cô giáo hỏi: 'Có ai có câu hỏi không?' — Bạn có một câu hỏi. Bạn nói:", "Someone sneezes. You say:": "Ai đó hắt hơi. Bạn nói:", "You want to congratulate a friend on winning. You say:": "Bạn muốn chúc mừng một người bạn vì đã thắng. Bạn nói:", "'See you tomorrow!' — The correct reply is:": "'Hẹn gặp lại vào ngày mai!' — Câu trả lời đúng là:", "You ask for directions: 'Excuse me, ___ the post office?'": "Bạn hỏi đường: 'Xin lỗi, ___ bưu điện ở đâu?'", "Someone asks you to repeat. You say:": "Ai đó yêu cầu bạn nói lại. Bạn nói:", "You describe the weather: 'It's ___ today.' (nice and sunny)": "Bạn miêu tả thời tiết: 'Hôm nay trời ___.' (đẹp và nắng)", "'Happy Birthday!' — The correct reply is:": "'Chúc mừng sinh nhật!' — Câu trả lời đúng là:", "You invite a friend: '___ come to my party on Saturday?'": "Bạn mời một người bạn: '___ đến dự tiệc của tôi vào thứ Bảy không?'", "At a shop: 'Here is your change.' — You say:": "Tại cửa hàng: 'Đây là tiền thừa của bạn.' — Bạn nói:", "You finish eating. You say to the host:": "Bạn ăn xong. Bạn nói với chủ nhà:", "You want to ask someone's opinion. You say:": "Bạn muốn hỏi ý kiến của ai đó. Bạn nói:", "You knock on a closed door. You say:": "Bạn gõ vào cửa đang đóng. Bạn nói:", "You want to make an apology. You say:": "Bạn muốn xin lỗi. Bạn nói:", "Someone asks 'How was school today?' — You say:": "Ai đó hỏi 'Hôm nay đi học thế nào?' — Bạn nói:", "You want to ask for help with homework. You say:": "Bạn muốn xin giúp đỡ về bài tập. Bạn nói:", "\"Sarah wakes up at 6:30. She brushes her teeth and gets dressed. She has cereal for breakfast. She walks to school and arrives at 7:45.\" — What time does Sarah arrive at school?": "Đọc đoạn văn: \"Sarah thức dậy lúc 6:30. Cô ấy đánh răng và mặc quần áo. Cô ấy ăn ngũ cốc cho bữa sáng. Cô ấy đi bộ đến trường và đến lúc 7:45.\" — Sarah đến trường lúc mấy giờ?", "\"Sarah wakes up at 6:30. She has cereal for breakfast.\" — What does Sarah eat?": "Đọc đoạn văn: \"Sarah thức dậy lúc 6:30. Cô ấy ăn ngũ cốc cho bữa sáng.\" — Sarah ăn gì?", "\"Tigers are big cats. They have orange and black stripes. They are good swimmers and can jump far.\" — What colours are tigers?": "Đọc đoạn văn: \"Hổ là loài mèo lớn. Chúng có sọc màu cam và đen. Chúng bơi giỏi và có thể nhảy xa.\" — Hổ có những màu gì?", "\"Tigers are big cats. They are good swimmers and can jump far.\" — What are tigers good at?": "Đọc đoạn văn: \"Hổ là loài mèo lớn. Chúng bơi giỏi và có thể nhảy xa.\" — Hổ giỏi về việc gì?", "\"The library has three sections: fiction, non-fiction, and children's books. Non-fiction books are about real things.\" — What are non-fiction books about?": "Đọc đoạn văn: \"Thư viện có ba khu: truyện hư cấu, phi hư cấu và sách trẻ em. Sách phi hư cấu viết về những điều có thật.\" — Sách phi hư cấu viết về điều gì?", "\"Mai's family has four members: her father, mother, younger brother, and herself. They live in a flat on the fifth floor.\" — How many people are in Mai's family?": "Đọc đoạn văn: \"Gia đình Mai có bốn người: bố, mẹ, em trai và Mai. Họ sống ở một căn hộ tầng năm.\" — Gia đình Mai có bao nhiêu người?", "\"Mai's family lives in a flat on the fifth floor.\" — Where do they live?": "Đọc đoạn văn: \"Gia đình Mai sống ở một căn hộ tầng năm.\" — Họ sống ở đâu?", "\"The summer fair has games, food stalls, and a lucky dip. Children get a small prize from the lucky dip.\" — Who gets a prize?": "Đọc đoạn văn: \"Hội chợ mùa hè có các trò chơi, gian hàng ăn và hộp quà may rủi. Trẻ em nhận được một món quà nhỏ từ hộp quà may rủi.\" — Ai nhận được quà?", "\"Dolphins are very clever animals. They live in the sea and communicate using sounds.\" — How do dolphins communicate?": "Đọc đoạn văn: \"Cá heo là loài động vật rất thông minh. Chúng sống ở biển và giao tiếp bằng âm thanh.\" — Cá heo giao tiếp bằng cách nào?", "\"The school trip is on Friday the 14th. Students must bring a packed lunch and wear comfortable shoes.\" — When is the school trip?": "Đọc đoạn văn: \"Chuyến đi của trường diễn ra vào thứ Sáu ngày 14. Học sinh phải mang theo cơm trưa và mặc giày thoải mái.\" — Chuyến đi của trường diễn ra khi nào?", "\"The school trip is on Friday 14th. Students must bring a packed lunch and wear comfortable shoes.\" — What must students bring?": "Đọc đoạn văn: \"Chuyến đi của trường diễn ra vào thứ Sáu ngày 14. Học sinh phải mang theo cơm trưa và mặc giày thoải mái.\" — Học sinh phải mang theo gì?", "\"Recycling helps the planet. We can recycle paper, glass, and plastic. It saves energy and reduces waste.\" — What does recycling help?": "Đọc đoạn văn: \"Tái chế giúp ích cho hành tinh. Chúng ta có thể tái chế giấy, thủy tinh và nhựa. Nó giúp tiết kiệm năng lượng và giảm rác thải.\" — Tái chế giúp ích cho điều gì?", "\"We can recycle paper, glass, and plastic.\" — Which of these can NOT be recycled according to the text?": "Đọc đoạn văn: \"Chúng ta có thể tái chế giấy, thủy tinh và nhựa.\" — Vật nào sau đây KHÔNG thể tái chế theo đoạn văn?", "\"The children planted seeds in small pots. They watered them every day. After two weeks, small green plants appeared.\" — How long did it take?": "Đọc đoạn văn: \"Các em trồng hạt giống trong những chậu nhỏ. Các em tưới nước mỗi ngày. Sau hai tuần, những cây nhỏ màu xanh xuất hiện.\" — Mất bao lâu?", "\"Bees are very important. They carry pollen from flower to flower. Without bees, many plants could not grow.\" — Why are bees important?": "Đọc đoạn văn: \"Ong rất quan trọng. Chúng mang phấn hoa từ hoa này sang hoa khác. Nếu không có ong, nhiều loài cây sẽ không thể phát triển.\" — Tại sao ong quan trọng?", "\"The museum opens at nine and closes at five. On Mondays it is closed.\" — When is the museum closed?": "Đọc đoạn văn: \"Bảo tàng mở cửa lúc 9 giờ và đóng cửa lúc 5 giờ. Vào thứ Hai bảo tàng đóng cửa.\" — Bảo tàng đóng cửa khi nào?", "\"Tom's hobby is collecting stamps. He has stamps from twenty different countries. His favourite stamp is from Japan.\" — How many countries?": "Đọc đoạn văn: \"Sở thích của Tom là sưu tập tem. Cậu ấy có tem từ 20 quốc gia khác nhau. Con tem yêu thích của cậu là từ Nhật Bản.\" — Có bao nhiêu quốc gia?", "\"Tom's hobby is collecting stamps. His favourite stamp is from Japan.\" — Where is Tom's favourite stamp from?": "Đọc đoạn văn: \"Sở thích của Tom là sưu tập tem. Con tem yêu thích của cậu là từ Nhật Bản.\" — Con tem yêu thích của Tom từ đâu?", "\"The weather in December is cold. People wear thick coats, scarves, and gloves.\" — What do people wear?": "Đọc đoạn văn: \"Thời tiết tháng 12 lạnh. Người ta mặc áo khoác dày, khăn quàng cổ và đeo găng tay.\" — Người ta mặc gì?", "\"Robots can be programmed to do many tasks. Some help in factories, and some help in hospitals.\" — Where do some robots work?": "Đọc đoạn văn: \"Robot có thể được lập trình để làm nhiều việc. Một số giúp việc ở nhà máy, một số giúp việc ở bệnh viện.\" — Một số robot làm việc ở đâu?", "\"Lan reads for thirty minutes every night before sleeping. She likes stories about animals.\" — What kind of stories does Lan like?": "Đọc đoạn văn: \"Lan đọc sách 30 phút mỗi tối trước khi ngủ. Cô ấy thích những câu chuyện về động vật.\" — Lan thích loại truyện gì?", "\"Vegetables such as carrots, peas, and spinach are full of vitamins. Eating them keeps us healthy.\" — Which is NOT in the text?": "Đọc đoạn văn: \"Các loại rau như cà rốt, đậu Hà Lan và rau bina chứa nhiều vitamin. Ăn chúng giúp ta khỏe mạnh.\" — Loại nào KHÔNG được nhắc đến trong đoạn văn?", "\"The post office is opposite the bank. It is near the supermarket.\" — Where is the post office?": "Đọc đoạn văn: \"Bưu điện đối diện với ngân hàng. Nó gần siêu thị.\" — Bưu điện ở đâu?", "\"On sports day, students compete in three events: the 100-metre race, the long jump, and the relay.\" — How many events?": "Đọc đoạn văn: \"Vào ngày hội thể thao, học sinh thi đấu ba nội dung: chạy 100m, nhảy xa và chạy tiếp sức.\" — Có bao nhiêu nội dung thi?", "\"An apple a day keeps the doctor away. This means eating fruit is good for health.\" — What does this saying suggest?": "Đọc đoạn văn: \"Mỗi ngày ăn một quả táo sẽ không cần đến bác sĩ. Điều này có nghĩa là ăn trái cây tốt cho sức khỏe.\" — Câu nói này muốn nói gì?", "\"Birds build nests to lay their eggs. The mother bird sits on the eggs to keep them warm.\" — Why does the mother bird sit on the eggs?": "Đọc đoạn văn: \"Chim làm tổ để đẻ trứng. Chim mẹ ấp trứng để giữ ấm cho trứng.\" — Tại sao chim mẹ ấp trứng?", "\"The swimming pool is open from Monday to Saturday. It is not open on Sundays.\" — How many days a week is the pool open?": "Đọc đoạn văn: \"Bể bơi mở từ thứ Hai đến thứ Bảy. Bể bơi không mở vào Chủ Nhật.\" — Bể bơi mở bao nhiêu ngày một tuần?", "\"In class, we follow rules: listen carefully, raise your hand to speak, and keep the classroom tidy.\" — What should you do before speaking?": "Đọc đoạn văn: \"Trong lớp, chúng ta tuân theo các quy tắc: lắng nghe cẩn thận, giơ tay trước khi nói, và giữ lớp học gọn gàng.\" — Bạn nên làm gì trước khi nói?", "\"The sun rises in the east and sets in the west. This happens every day.\" — Where does the sun set?": "Đọc đoạn văn: \"Mặt trời mọc ở hướng đông và lặn ở hướng tây. Điều này xảy ra mỗi ngày.\" — Mặt trời lặn ở hướng nào?", "\"A caterpillar changes into a butterfly. This process takes place inside a cocoon.\" — Where does the change happen?": "Đọc đoạn văn: \"Sâu bướm biến thành bướm. Quá trình này diễn ra bên trong cái kén.\" — Sự biến đổi diễn ra ở đâu?", "\"Water covers about 71% of the Earth's surface. Most of this water is in the oceans.\" — What covers most of the Earth?": "Đọc đoạn văn: \"Nước chiếm khoảng 71% diện tích bề mặt Trái Đất. Phần lớn lượng nước này nằm ở các đại dương.\" — Cái gì chiếm phần lớn diện tích Trái Đất?", "\"The cheetah is the fastest land animal. It can run at speeds of up to 120 kilometres per hour.\" — What is special about the cheetah?": "Đọc đoạn văn: \"Báo gêpa là động vật trên cạn chạy nhanh nhất. Nó có thể chạy với tốc độ lên đến 120 km/giờ.\" — Điều gì đặc biệt về báo gêpa?", "\"A compass always points north. Explorers use it to find their direction.\" — What does a compass always point to?": "Đọc đoạn văn: \"Cái la bàn luôn chỉ về hướng bắc. Các nhà thám hiểm dùng nó để xác định phương hướng.\" — La bàn luôn chỉ về hướng nào?", "\"The Great Wall of China is over 21,000 kilometres long. It was built to protect China.\" — Why was the Great Wall built?": "Đọc đoạn văn: \"Vạn Lý Trường Thành dài hơn 21.000 km. Nó được xây để bảo vệ Trung Quốc.\" — Tại sao Vạn Lý Trường Thành được xây dựng?", "\"Photosynthesis is the process by which plants use sunlight to make food. They also need water and carbon dioxide.\" — What do plants use to make food?": "Đọc đoạn văn: \"Quang hợp là quá trình cây sử dụng ánh sáng mặt trời để tạo ra thức ăn. Cây cũng cần nước và khí cacbonic.\" — Cây dùng gì để tạo ra thức ăn?", "\"She ___ never late for school.\" — correct form:": "Chọn dạng đúng: \"She ___ never late for school.\" (Cô ấy không bao giờ đi học muộn.)", "'The children are eating lunch.' — This sentence is in:": "'The children are eating lunch.' — Câu này ở thì:", "Which word does NOT belong? Cat, Dog, Table, Fish": "Từ nào KHÔNG cùng nhóm? Cat, Dog, Table, Fish", "Which word does NOT belong? Red, Blue, Run, Green": "Từ nào KHÔNG cùng nhóm? Red, Blue, Run, Green", "'One child, two ___.' — correct plural:": "Chọn dạng số nhiều đúng: 'One child, two ___.' (Một đứa trẻ, hai ___.)", "'One mouse, two ___.' — correct plural:": "Chọn dạng số nhiều đúng: 'One mouse, two ___.' (Một con chuột, hai ___.)", "Choose the correct spelling:": "Chọn cách viết đúng:", "\"___ do you go to the library?\" — \"Every Saturday.\"": "Điền vào chỗ trống: \"___ do you go to the library?\" — \"Every Saturday.\" (Bạn đi thư viện khi nào? — Mỗi thứ Bảy.)", "\"___ is your best friend?\" — \"It's Nam.\"": "Điền vào chỗ trống: \"___ is your best friend?\" — \"It's Nam.\" (Bạn thân nhất của bạn là ai? — Là Nam.)", "\"___ does she travel to school?\" — \"By bicycle.\"": "Điền vào chỗ trống: \"___ does she travel to school?\" — \"By bicycle.\" (Cô ấy đi học bằng gì? — Bằng xe đạp.)", "'The cat is ___ the chair.' (below the chair) — correct preposition:": "Chọn giới từ đúng (con mèo ở dưới ghế): 'The cat is ___ the chair.'", "'Put the book ___ the shelf.' — correct preposition:": "Chọn giới từ đúng: 'Put the book ___ the shelf.' (Đặt cuốn sách ... cái kệ.)", "The opposite of 'always' is:": "Từ trái nghĩa với 'always' (luôn luôn) là:", "\"She is taller ___ her brother.\"": "Điền vào chỗ trống: \"She is taller ___ her brother.\" (Cô ấy cao hơn anh trai mình.)", "Choose the correct article: '___ hour is a long time.'": "Chọn mạo từ đúng: '___ hour is a long time.' (Một giờ là một khoảng thời gian dài.)", "\"___ is the matter?\" — \"I have a headache.\"": "Điền vào chỗ trống: \"___ is the matter?\" — \"I have a headache.\" (Có chuyện gì vậy? — Tôi bị đau đầu.)", "Which sentence is correct?": "Câu nào đúng?", "'Minh studies hard. ___ always gets good marks.' — correct pronoun:": "Chọn đại từ đúng: 'Minh studies hard. ___ always gets good marks.' (Minh học chăm chỉ. ___ luôn đạt điểm cao.)", "'Lan and I go to the same school. ___ are in class 3B.' — correct pronoun:": "Chọn đại từ đúng: 'Lan and I go to the same school. ___ are in class 3B.' (Lan và tôi học cùng trường. ___ học lớp 3B.)", "'Would you like some water?' — Best response:": "'Bạn có muốn uống nước không?' — Câu trả lời phù hợp nhất:", "'Shall we go to the park?' — Best response:": "'Chúng ta đi công viên nhé?' — Câu trả lời phù hợp nhất:", "Which sentence has the CORRECT word order?": "Câu nào có TRẬT TỰ TỪ đúng?", "'More beautiful' is the ___ form of 'beautiful'.": "'More beautiful' là dạng ___ của 'beautiful'.", "'The most beautiful' is the ___ form.": "'The most beautiful' là dạng ___.", "\"___ a dog in the garden.\" — correct form:": "Chọn dạng đúng: \"___ a dog in the garden.\" (Có một con chó trong vườn.)", "\"___ many stars in the sky tonight.\" — correct form:": "Chọn dạng đúng: \"___ many stars in the sky tonight.\" (Có nhiều sao trên trời tối nay.)", "\"She ___ to music while she does her homework.\"": "Điền vào chỗ trống: \"She ___ to music while she does her homework.\" (Cô ấy nghe nhạc khi làm bài tập.)", "Choose the word with the correct spelling:": "Chọn từ có cách viết đúng:", "Which sentence uses 'can' correctly?": "Câu nào dùng 'can' đúng?", "'The biggest city in Vietnam is ___.'": "'Thành phố lớn nhất ở Việt Nam là ___.'", "Which question is correct?": "Câu hỏi nào đúng?", "'He ___ TV for two hours every evening.' — correct verb form:": "Chọn dạng động từ đúng: 'He ___ TV for two hours every evening.' (Anh ấy xem TV 2 giờ mỗi tối.)", "🔊 Nghe: \"I have a red ball. It is big and round.\" — What color is the ball?": "Đoạn nghe: \"Tôi có một quả bóng màu đỏ. Nó to và tròn.\" — Quả bóng màu gì?", "🔊 Nghe: \"I have a red ball. It is big and round.\" — What shape is the ball?": "Đoạn nghe: \"Tôi có một quả bóng màu đỏ. Nó to và tròn.\" — Quả bóng có hình dạng gì?", "🔊 Nghe: \"My name is Minh. I am eight years old. I go to school every day.\" — How old is Minh?": "Đoạn nghe: \"Tên tôi là Minh. Tôi 8 tuổi. Tôi đi học mỗi ngày.\" — Minh bao nhiêu tuổi?", "🔊 Nghe: \"My name is Minh. I am eight years old. I go to school every day.\" — Where does Minh go every day?": "Đoạn nghe: \"Tên tôi là Minh. Tôi 8 tuổi. Tôi đi học mỗi ngày.\" — Minh đi đâu mỗi ngày?", "🔊 Nghe: \"There is a cat on the table. The cat is white. It has green eyes.\" — Where is the cat?": "Đoạn nghe: \"Có một con mèo trên bàn. Con mèo màu trắng. Nó có mắt màu xanh lá.\" — Con mèo ở đâu?", "🔊 Nghe: \"There is a cat on the table. The cat is white. It has green eyes.\" — What color are the cat's eyes?": "Đoạn nghe: \"Có một con mèo trên bàn. Con mèo màu trắng. Nó có mắt màu xanh lá.\" — Mắt con mèo màu gì?", "🔊 Nghe: \"It is Monday. The weather is sunny. Lan and her friends play in the garden.\" — What day is it?": "Đoạn nghe: \"Hôm nay là thứ Hai. Thời tiết nắng. Lan và các bạn chơi trong vườn.\" — Hôm nay là thứ mấy?", "🔊 Nghe: \"It is Monday. The weather is sunny. Lan and her friends play in the garden.\" — What is the weather like?": "Đoạn nghe: \"Hôm nay là thứ Hai. Thời tiết nắng. Lan và các bạn chơi trong vườn.\" — Thời tiết như thế nào?", "🔊 Nghe: \"Tom has two dogs and one cat. He feeds them every morning.\" — How many dogs does Tom have?": "Đoạn nghe: \"Tom có hai con chó và một con mèo. Cậu ấy cho chúng ăn mỗi sáng.\" — Tom có bao nhiêu con chó?", "🔊 Nghe: \"Tom has two dogs and one cat. He feeds them every morning.\" — When does Tom feed his pets?": "Đoạn nghe: \"Tom có hai con chó và một con mèo. Cậu ấy cho chúng ăn mỗi sáng.\" — Tom cho vật nuôi ăn khi nào?", "🔊 Nghe: \"My classroom is big. There are twenty students in my class. Our teacher is kind.\" — How many students?": "Đoạn nghe: \"Lớp học của tôi rất rộng. Có 20 học sinh trong lớp. Cô giáo của chúng tôi rất tốt bụng.\" — Có bao nhiêu học sinh?", "🔊 Nghe: \"My classroom is big. There are twenty students in my class. Our teacher is kind.\" — What is the teacher like?": "Đoạn nghe: \"Lớp học của tôi rất rộng. Có 20 học sinh trong lớp. Cô giáo của chúng tôi rất tốt bụng.\" — Cô giáo như thế nào?", "🔊 Nghe: \"Na likes to draw. She draws flowers and butterflies. Her favourite color is pink.\" — What does Na like?": "Đoạn nghe: \"Na thích vẽ. Cô ấy vẽ hoa và bươm bướm. Màu yêu thích của cô ấy là màu hồng.\" — Na thích làm gì?", "🔊 Nghe: \"Na likes to draw. She draws flowers and butterflies. Her favourite color is pink.\" — What is Na's favourite color?": "Đoạn nghe: \"Na thích vẽ. Cô ấy vẽ hoa và bươm bướm. Màu yêu thích của cô ấy là màu hồng.\" — Màu yêu thích của Na là gì?", "🔊 Nghe: \"It is breakfast time. I eat bread and drink milk. Then I go to school.\" — What does the child drink?": "Đoạn nghe: \"Đã đến giờ ăn sáng. Tôi ăn bánh mì và uống sữa. Sau đó tôi đi học.\" — Em bé uống gì?", "🔊 Nghe: \"It is breakfast time. I eat bread and drink milk. Then I go to school.\" — What does the child eat?": "Đoạn nghe: \"Đã đến giờ ăn sáng. Tôi ăn bánh mì và uống sữa. Sau đó tôi đi học.\" — Em bé ăn gì?", "🔊 Nghe: \"My father is a doctor. He works at the hospital. He helps sick people.\" — What is the father's job?": "Đoạn nghe: \"Bố tôi là bác sĩ. Ông làm việc ở bệnh viện. Ông giúp đỡ người bệnh.\" — Nghề nghiệp của bố là gì?", "🔊 Nghe: \"My father is a doctor. He works at the hospital. He helps sick people.\" — Where does he work?": "Đoạn nghe: \"Bố tôi là bác sĩ. Ông làm việc ở bệnh viện. Ông giúp đỡ người bệnh.\" — Ông làm việc ở đâu?", "🔊 Nghe: \"I can see three birds in the tree. They are singing a beautiful song.\" — How many birds?": "Đoạn nghe: \"Tôi thấy ba con chim trên cây. Chúng đang hót một bài hát rất hay.\" — Có bao nhiêu con chim?", "🔊 Nghe: \"Look at the picture. There is a dog. The dog is brown. It is running.\" — What is the dog doing?": "Đoạn nghe: \"Nhìn vào bức tranh. Có một con chó. Con chó màu nâu. Nó đang chạy.\" — Con chó đang làm gì?", "🔊 Nghe: \"My mother cooks dinner at six o'clock. The food smells delicious.\" — What time does the mother cook?": "Đoạn nghe: \"Mẹ tôi nấu bữa tối lúc 6 giờ. Thức ăn có mùi rất ngon.\" — Mẹ nấu ăn lúc mấy giờ?", "🔊 Nghe: \"The children are at the park. They play football and fly kites.\" — Where are the children?": "Đoạn nghe: \"Các em đang ở công viên. Các em chơi bóng đá và thả diều.\" — Các em đang ở đâu?", "🔊 Nghe: \"The children are at the park. They play football and fly kites.\" — What do they fly?": "Đoạn nghe: \"Các em đang ở công viên. Các em chơi bóng đá và thả diều.\" — Các em thả gì?", "🔊 Nghe: \"Peter has a new bike. It is blue and very fast.\" — What color is the bike?": "Đoạn nghe: \"Peter có một chiếc xe đạp mới. Nó màu xanh và rất nhanh.\" — Chiếc xe đạp màu gì?", "🔊 Nghe: \"It is raining today. I wear a raincoat and carry an umbrella.\" — What is the weather like?": "Đoạn nghe: \"Hôm nay trời đang mưa. Tôi mặc áo mưa và mang theo dù.\" — Thời tiết như thế nào?", "🔊 Nghe: \"It is raining today. I wear a raincoat and carry an umbrella.\" — What does the person carry?": "Đoạn nghe: \"Hôm nay trời đang mưa. Tôi mặc áo mưa và mang theo dù.\" — Người đó mang theo gì?", "🔊 Nghe: \"My sister is six years old. She goes to kindergarten every day.\" — How old is the sister?": "Đoạn nghe: \"Em gái tôi 6 tuổi. Em đi mẫu giáo mỗi ngày.\" — Em gái bao nhiêu tuổi?", "🔊 Nghe: \"We have English class on Monday and Wednesday.\" — On which days do they have English?": "Đoạn nghe: \"Chúng tôi có lớp Tiếng Anh vào thứ Hai và thứ Tư.\" — Họ học Tiếng Anh vào những ngày nào?", "🔊 Nghe: \"The shop opens at eight in the morning and closes at nine at night.\" — What time does the shop open?": "Đoạn nghe: \"Cửa hàng mở lúc 8 giờ sáng và đóng lúc 9 giờ tối.\" — Cửa hàng mở lúc mấy giờ?", "🔊 Nghe: \"I have a cat named Mimi. She is fluffy and loves to sleep.\" — What is the cat's name?": "Đoạn nghe: \"Tôi có một con mèo tên là Mimi. Nó lông xù và thích ngủ.\" — Tên con mèo là gì?", "🔊 Nghe: \"Today is Wednesday. I have PE and Science. PE is my favourite lesson.\" — What day is it?": "Đoạn nghe: \"Hôm nay là thứ Tư. Tôi có môn Thể dục và Khoa học. Thể dục là môn yêu thích của tôi.\" — Hôm nay là thứ mấy?", "🔊 Nghe: \"Ann wakes up at half past six. She has toast and juice for breakfast.\" — What does Ann drink?": "Đoạn nghe: \"Ann thức dậy lúc 6 giờ 30. Cô ấy ăn bánh mì nướng và uống nước trái cây cho bữa sáng.\" — Ann uống gì?", "🔊 Nghe: \"There are twelve months in a year. June is the sixth month.\" — Which month is the sixth?": "Đoạn nghe: \"Một năm có 12 tháng. Tháng Sáu là tháng thứ sáu.\" — Tháng nào là tháng thứ sáu?", "🔊 Nghe: \"Nam's school bag is red. He has five books and a pencil case inside.\" — How many books are in the bag?": "Đoạn nghe: \"Cặp sách của Nam màu đỏ. Bên trong có 5 cuốn sách và một hộp bút.\" — Có bao nhiêu cuốn sách trong cặp?", "🔊 Nghe: \"Our teacher writes on the whiteboard with a blue marker.\" — What color is the marker?": "Đoạn nghe: \"Cô giáo của chúng tôi viết lên bảng trắng bằng bút lông màu xanh.\" — Bút lông màu gì?", "🔊 Nghe: \"Anna gets up at six thirty. She has breakfast at seven. Then she walks to school with her friend Linda.\" — What time does Anna get up?": "Đoạn nghe: \"Anna thức dậy lúc 6 giờ 30. Cô ấy ăn sáng lúc 7 giờ. Sau đó cô đi bộ đến trường với bạn Linda.\" — Anna thức dậy lúc mấy giờ?", "🔊 Nghe: \"Anna gets up at six thirty. She has breakfast at seven. Then she walks to school with her friend Linda.\" — Who does Anna walk to school with?": "Đoạn nghe: \"Anna thức dậy lúc 6 giờ 30. Cô ấy ăn sáng lúc 7 giờ. Sau đó cô đi bộ đến trường với bạn Linda.\" — Anna đi học cùng ai?", "🔊 Nghe: \"The zoo has lions, elephants, and giraffes. The giraffe is the tallest animal.\" — Which animal is the tallest?": "Đoạn function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function pickN(arr,n){return shuffle(arr).slice(0,n);}

const NUMBER_WORDS=["zero","one","two","three","four","five","six","seven","eight","nine","ten",
  "eleven","twelve","thirteen","fourteen","fifteen","sixteen","seventeen","eighteen","nineteen","twenty",
  "twenty-one","twenty-two","twenty-three","twenty-four","twenty-five","thirty","forty","fifty"];
function numberToWordEn(n){
  if(n>=0&&n<NUMBER_WORDS.length)return NUMBER_WORDS[n].replace(/^./,c=>c.toUpperCase());
  return String(n);
}
function genMathQuestion(){
  const isAdd=Math.random()<0.5;
  let a,b,result;
  if(isAdd){a=Math.floor(Math.random()*16)+1;b=Math.floor(Math.random()*16)+1;result=a+b;}
  else{a=Math.floor(Math.random()*20)+5;b=Math.floor(Math.random()*a);result=a-b;}
  if(result>28)result=28;
  const correct=numberToWordEn(result);
  const wrongNums=new Set();
  let safety=0;
  while(wrongNums.size<3&&safety<200){
    safety++;
    const delta=pick([-5,-4,-3,-2,-1,1,2,3,4,5]);
    const w=Math.max(0,Math.min(28,result+delta));
    if(w!==result)wrongNums.add(w);
  }
  const choices=[correct,...[...wrongNums].map(numberToWordEn)];
  return {q:`What is ${a} ${isAdd?'+':'-'} ${b}?`,img:isAdd?"➕":"➖",choices:shuffle(choices),answer:correct};
}
const COUNT_EMOJI_POOL=[["🍎","apples"],["⭐","stars"],["🐱","cats"],["🎈","balloons"],["🌸","flowers"],

function genCountQuestion(){
  const [emoji,word]=pick(COUNT_EMOJI_POOL);
  const n=Math.floor(Math.random()*8)+2;
  const correct=numberToWordEn(n);
  const wrongSet=new Set();
  let safety=0;
  while(wrongSet.size<3&&safety<200){
    safety++;
    const delta=pick([-3,-2,-1,1,2,3]);
    const w=Math.max(1,Math.min(12,n+delta));
    if(w!==n)wrongSet.add(w);
  }
  const choices=[correct,...[...wrongSet].map(numberToWordEn)];
  return {q:`How many ${word} are there?`,img:emoji.repeat(n),choices:shuffle(choices),answer:correct};
}

// ===================== GENERATOR: CÂU SO SÁNH (comparatives & superlatives) =====================
// Tính từ ngắn: thêm -er/-est ; tính từ có y -> ier/iest ; tính từ dài: more/most
const COMPARE_ADJECTIVES=[
  ["tall","taller","tallest"],["short","shorter","shortest"],["big","bigger","biggest"],
  ["small","smaller","smallest"],["long","longer","longest"],["fast","faster","fastest"],
  ["slow","slower","slowest"],["old","older","oldest"],["young","younger","youngest"],
  ["strong","stronger","strongest"],["high","higher","highest"],["large","larger","largest"],
  ["small","smaller","smallest"],["happy","happier","happiest"],["heavy","heavier","heaviest"],
  ["pretty","prettier","prettiest"],["busy","busier","busiest"],["easy","easier","easiest"],
  ["hot","hotter","hottest"],["thin","thinner","thinnest"],["big","bigger","biggest"],
  ["beautiful","more beautiful","most beautiful"],["expensive","more expensive","most expensive"],
  ["interesting","more interesting","most interesting"],["difficult","more difficult","most difficult"],
  ["careful","more careful","most careful"],["famous","more famous","most famous"]
];
const COMPARE_NOUNS=[["the elephant","the mouse"],["my brother","my sister"],["the bus","the bike"],
  ["the mountain","the hill"],["Lan","Mai"],["the lion","the cat"],["my father","my grandfather"],
  ["the river","the lake"],["Tom","Ben"],["the giraffe","the dog"],["the car","the bicycle"],
  ["my school bag","my pencil case"],["the rabbit","the turtle"],["the sun","the moon"]];
const COMPARE_NOUNS_THREE=[["the elephant","the dog","the mouse"],["my father","my brother","I"],
  ["the mountain","the hill","the field"],["Lan","Mai","Hoa"],["the bus","the car","the bike"],
  ["the lion","the cat","the rabbit"],["the river","the stream","the pond"],["Tom","Ben","Sam"]];

function genComparativeQuestion(){
  const [base,comparative]=pick(COMPARE_ADJECTIVES);
  const [a,b]=pick(COMPARE_NOUNS);
  const correct=comparative+" than";
  const wrongs=[base+" than","the "+comparative,base+"est than"].filter(w=>w!==correct);
  while(wrongs.length<3)wrongs.push(comparative+" as");
  return {q:`${a} is ___ ${b}. (${base})`,choices:shuffle([correct,...wrongs.slice(0,3)]),answer:correct};
}
function genSuperlativeQuestion(){
  const [base,comparative,superlative]=pick(COMPARE_ADJECTIVES);
  const group=pick(COMPARE_NOUNS_THREE);
  const correct="the "+superlative;
  const wrongs=[base,"the "+comparative,comparative+" than"];
  return {q:`Of all three, ${group[0]}, ${group[1]} and ${group[2]}, ${pick(group)} is ___. (${base})`,
    choices:shuffle([correct,...wrongs]),answer:correct};
}
function genEqualComparisonQuestion(){
  const [base]=pick(COMPARE_ADJECTIVES);
  const [a,b]=pick(COMPARE_NOUNS);
  const correct="as "+base+" as";
  const wrongs=["than "+base,base+"er than","more "+base];
  return {q:`${a} is ___ ${b}. (They are equal. Adjective: ${base})`,choices:shuffle([correct,...wrongs]),answer:correct};
}
function genLessComparisonQuestion(){
  const [base,comparative]=pick(COMPARE_ADJECTIVES);
  const [a,b]=pick(COMPARE_NOUNS);
  const correct="less "+base+" than";
  const wrongPool=[...new Set([comparative+" than","as "+base+" as","more "+base+" than",base+"er than"])]
    .filter(w=>w!==correct);
  const wrongs=pickN(wrongPool,3);
  return {q:`${a} is ___ ${b}. (${a} has a lower degree of '${base}'.)`,choices:shuffle([correct,...wrongs]),answer:correct};
}
function genComparativeChoiceQuestion(){
  const [base,comparative]=pick(COMPARE_ADJECTIVES);
  const wrongForms=[base+base.slice(-1)+"er",base+"est",comparative.replace("er","ier"),"more "+base+"er"]
    .filter(w=>w!==comparative);
  const wrongs=pickN([...new Set(wrongForms)],3);
  while(wrongs.length<3)wrongs.push("most "+base);
  return {q:`Choose the correct comparative form of '${base}'.`,choices:shuffle([comparative,...wrongs.slice(0,3)]),answer:comparative};
}

function buildQuestionsForRound(round){
  const fixedRatio=0.5; // khoảng 50% câu lấy từ bank cố định, 50% sinh tự động (nếu có generators)
  const gens=round.generators||[];
  if(gens.length===0){
    return shuffle(round.bank).slice(0,round.needCount).map(item=>({
      q:item.q, img:item.img||null, choices:shuffle(item.choices), answer:item.answer
    }));
  }
  const uniqueKey=item=>item.q+"|"+(item.img||"");
  const seenQ=new Set();
  const result=[];
  const fixedCount=Math.round(round.needCount*fixedRatio);
  const fixedPicks=shuffle(round.bank);
  for(const item of fixedPicks){
    if(result.length>=fixedCount)break;
    const key=uniqueKey(item);
    if(seenQ.has(key))continue;
    seenQ.add(key);
    result.push({q:item.q, img:item.img||null, choices:shuffle(item.choices), answer:item.answer});
  }
  let attempts=0;
  while(result.length<round.needCount&&attempts<round.needCount*120){
    attempts++;
    const gen=pick(gens);
    const item=gen();
    if(!item)continue;
    const key=uniqueKey(item);
    if(seenQ.has(key))continue;
    seenQ.add(key);
    result.push({q:item.q, img:item.img||null, choices:item.choices, answer:item.answer});
  }
  // nếu vẫn thiếu (hiếm khi xảy ra do trùng quá nhiều), bổ sung thêm từ bank còn lại
  if(result.length<round.needCount){
    for(const item of fixedPicks){
      if(result.length>=round.needCount)break;
      const key=uniqueKey(item);
      if(seenQ.has(key))continue;
      seenQ.add(key);
      result.push({q:item.q, img:item.img||null, choices:shuffle(item.choices), answer:item.answer});
    }
  }
  return shuffle(result).slice(0,round.needCount);
}
