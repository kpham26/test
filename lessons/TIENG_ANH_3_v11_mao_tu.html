function startRound(idx){
  const ROUNDS=getRounds();
  state.currentRoundIndex=idx;
  const round=ROUNDS[idx];
  state.quiz={questions:buildQuestionsForRound(round),qi:0,correctCount:0,wrongCount:0,
    answered:false,score:0};
  state.screen="quiz";
  render();
  if(round.isListening){
    const {passage}=extractListeningParts(state.quiz.questions[0].q);
    setTimeout(()=>speakText(passage),600);
  }
}

function currentRound(){return getRounds()[state.currentRoundIndex];}
function currentQuestion(){return state.quiz.questions[state.quiz.qi];}

function extractListeningParts(qText){
  const m=qText.match(/🔊 Nghe: "(.+?)" — (.+)/);
  if(m)return{passage:m[1],question:m[2]};
  return{passage:"",question:qText};
}

// Danh sách từ khóa nhận diện giới tính giọng đọc theo tên giọng (Web Speech API không có cờ giới tính chính thức)
// Dùng so khớp theo "từ trọn vẹn" (word-boundary) để tránh khớp nhầm substring, ví dụ "man" trong "Samantha"
const FEMALE_VOICE_HINTS=["female","woman","samantha","victoria","susan","karen","moira","tessa","fiona",
  "zira","aria","jenny","emma","ava","allison","ana","kate","linda","amy","joanna","salli","kimberly",
  "nicky","serena","veena","sara","monica","paulina","anna","laura"];
const MALE_VOICE_HINTS=["male","daniel","alex","fred","george","james","mark","oliver",
  "ryan","liam","matthew","russell","brian","arthur","eric","gordon","justin","kevin","aaron","david"];
function nameHasWord(name,word){
  // so khớp "word" như một từ trọn vẹn trong "name" (không tính là substring của từ khác)
  return new RegExp("\\b"+word+"\\b","i").test(name);
}
let cachedVoices=[];
function refreshVoiceList(){
  if(!window.speechSynthesis)return;
  const v=window.speechSynthesis.getVoices();
  if(v&&v.length)cachedVoices=v;
}
function pickVoiceByGender(gender){
  if(!cachedVoices.length)refreshVoiceList();
  const enVoices=cachedVoices.filter(v=>v.lang&&v.lang.toLowerCase().startsWith("en"));
  const pool=enVoices.length?enVoices:cachedVoices;
  const hints=gender==="male"?MALE_VOICE_HINTS:FEMALE_VOICE_HINTS;
  const otherHints=gender==="male"?FEMALE_VOICE_HINTS:MALE_VOICE_HINTS;
  // chỉ chọn voice khớp đúng giới tính mong muốn VÀ không khớp nhầm giới tính đối lập
  const match=pool.find(v=>{
    const matchesWanted=hints.some(h=>nameHasWord(v.name,h));
    const matchesOther=otherHints.some(h=>nameHasWord(v.name,h));
    return matchesWanted&&!matchesOther;
  });
  if(match)return match;
  // fallback: nhiều hệ thống đặt giọng nữ ở vị trí đầu danh sách en-US theo quy ước phổ biến
  return pool[0]||null;
}
function speakText(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const utt=new SpeechSynthesisUtterance(text);
  utt.lang="en-US"; utt.rate=0.88; utt.pitch=state.voiceGender==="male"?0.95:1.05;
  const voice=pickVoiceByGender(state.voiceGender);
  if(voice)utt.voice=voice;
  window.speechSynthesis.speak(utt);
}
if(window.speechSynthesis){
  refreshVoiceList();
  window.speechSynthesis.onvoiceschanged=refreshVoiceList;
}
function setVoiceGender(gender){
  state.voiceGender=gender;
  document.querySelectorAll('.voice-gender-btn').forEach(btn=>{
    const isActive=btn.getAttribute('data-gender')===gender;
    btn.style.background=isActive?"#fff":"rgba(255,255,255,0.15)";
    btn.style.color=isActive?"#0d47a1":"#fff";
    btn.style.border=isActive?"2px solid #fff":"2px solid rgba(255,255,255,0.4)";
  });
}

function renderListeningBox(q){
  const{passage,question}=extractListeningParts(q.q);
  const safePassage=encodeURIComponent(passage);
  const translation=getQuestionTranslation(q.q);
  const isFemale=state.voiceGender!=="male";
  const femaleBtnStyle=isFemale
    ?"background:#fff;color:#0d47a1;border:2px solid #fff;"
    :"background:rgba(255,255,255,0.15);color:#fff;border:2px solid rgba(255,255,255,0.4);";
  const maleBtnStyle=!isFemale
    ?"background:#fff;color:#0d47a1;border:2px solid #fff;"
    :"background:rgba(255,255,255,0.15);color:#fff;border:2px solid rgba(255,255,255,0.4);";
  return `<div class="question-box" style="padding:0;overflow:hidden;border:2px solid #A8D8EA;">
    <div style="background:linear-gradient(135deg,#1a73e8,#0d47a1);padding:12px 16px;border-radius:14px 14px 0 0;">
      <div style="color:rgba(255,255,255,0.85);font-size:0.72rem;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;">🎧 Đoạn nghe</div>
      <div style="color:#fff;font-size:1.05rem;font-weight:800;line-height:1.5;text-align:left;">"${passage}"</div>
      <div style="display:flex;flex-wrap:wrap;align-items:center;gap:8px;margin-top:10px;">
        <button onclick="speakText(decodeURIComponent('${safePassage}'))"
          style="background:rgba(255,255,255,0.2);border:2px solid rgba(255,255,255,0.5);color:#fff;
          border-radius:20px;padding:6px 16px;font-weight:800;font-size:0.88rem;cursor:pointer;display:inline-flex;align-items:center;gap:6px;">
          🔊 Nghe lại</button>
        <div style="display:flex;gap:6px;align-items:center;">
          <span style="color:rgba(255,255,255,0.7);font-size:0.72rem;font-weight:700;">Giọng:</span>
          <button class="voice-gender-btn" data-gender="female"
            style="${femaleBtnStyle}border-radius:20px;padding:5px 12px;font-weight:800;font-size:0.82rem;cursor:pointer;">
            👩 Nữ</button>
          <button class="voice-gender-btn" data-gender="male"
            style="${maleBtnStyle}border-radius:20px;padding:5px 12px;font-weight:800;font-size:0.82rem;cursor:pointer;">
            👨 Nam</button>
        </div>
      </div>
    </div>
    <div style="padding:14px 16px;">
      <div class="q-count" style="margin-bottom:6px;">❓ Câu hỏi</div>
      <div class="q-text" style="font-size:1.08rem;">${question}</div>
      ${translation?`<div class="q-trans">${translation}</div>`:''}
    </div></div>`;
}

function renderQuiz(){
  const round=currentRound();
  const q=currentQuestion();
  const isHard=state.difficulty==="hard";
  const totalQ=state.quiz.questions.length;
  const progressPct=Math.round((state.quiz.qi/totalQ)*100);
  let optionsHtml="";
  q.choices.forEach(choice=>{
    const viTrans=getChoiceTranslation(choice);
    optionsHtml+=`<button class="opt ${isHard?'hard-opt':''}" data-choice="${encodeURIComponent(choice)}">
      <span class="opt-en">${choice}</span>
      ${viTrans?`<span class="opt-vi">🇻🇳 ${viTrans}</span>`:''}
    </button>`;
  });
  const topCardClass=isHard?"top-card hard-mode-card":"top-card";
  const metaChipClass=isHard?"meta-chip hard":"meta-chip";
  const progressClass=isHard?"progress-bar-inner hard":"progress-bar-inner";
  return `<div class="${topCardClass}">
    <div class="brand-row">
      <button class="home-mini-btn" id="btnHomeMini">🏠 Trang chủ</button>
      <div class="score-chip">⭐ ${state.quiz.score}</div>
    </div>
    <div class="brand" style="margin-bottom:10px; display:flex; align-items:center; justify-content:space-between;">
      <span><span class="flag">${round.icon}</span> ${round.title}</span>
      <button class="sound-btn${state.soundOn?'':' muted'}" id="btnSound" title="Bật/tắt đọc đáp án">
        ${state.soundOn?'🔊':'🔇'} Đọc đáp án
      </button>
    </div>
    <div class="stage-track">${renderStageTrack()}</div>
  </div>
  <div class="card">
    <div class="quiz-meta">
      <div class="${metaChipClass}">Câu ${state.quiz.qi+1}/${totalQ}</div>
    </div>
    <div class="progress-bar-outer"><div class="${progressClass}" style="width:${progressPct}%"></div></div>
    ${round.isListening?renderListeningBox(q):`
    <div class="question-box ${isHard?'hard':''}">
      <div class="q-count">Câu hỏi</div>
      ${q.img?`<div style="font-size:2.4rem;margin-bottom:8px;">${q.img}</div>`:''}
      <div class="q-text">${q.q}</div>
      ${getQuestionTranslation(q.q)?`<div class="q-trans">${getQuestionTranslation(q.q)}</div>`:''}
    </div>`}
    <div class="options" id="optionsWrap">${optionsHtml}</div>
    <div class="feedback-banner" id="feedbackBanner"></div>
  </div>`;
}

function handleAnswer(selectedChoice){
  if(state.quiz.answered)return;
  state.quiz.answered=true;
  const q=currentQuestion();
  const isCorrect=selectedChoice===q.answer;
  document.getElementById('optionsWrap').querySelectorAll('.opt').forEach(btn=>{
    const val=decodeURIComponent(btn.getAttribute('data-choice'));
    btn.classList.add('disabled');
    if(val===q.answer)btn.classList.add('correct');
    else if(val===selectedChoice&&!isCorrect)btn.classList.add('wrong');
  });
  const banner=document.getElementById('feedbackBanner');
  if(isCorrect){
    state.quiz.correctCount++;
    state.quiz.score+=10;
    banner.textContent="🎉 Chính xác! Tuyệt vời!";
    banner.className="feedback-banner show ok";
    if(state.soundOn) setTimeout(()=>speakText(q.answer),300);
  } else {
    state.quiz.wrongCount++;
    banner.textContent="❌ Chưa đúng. Đáp án đúng là: "+q.answer;
    banner.className="feedback-banner show bad";
    if(state.soundOn) setTimeout(()=>speakText(q.answer),300);
  }
  setTimeout(()=>nextQuestionOrFinish(),1900);
}

function nextQuestionOrFinish(){
  state.quiz.qi++;
  if(state.quiz.qi>=state.quiz.questions.length){finishRound(true);return;}
  state.quiz.answered=false;
  render();
  if(currentRound().isListening){
    const{passage}=extractListeningParts(currentQuestion().q);
    setTimeout(()=>speakText(passage),400);
  }
}

function finishRound(reachedEnd){
  const round=currentRound();
  const total=state.quiz.questions.length;
  const correct=state.quiz.correctCount;
  const passed=reachedEnd&&(correct/total)>=round.passRatio;
  state.history=state.history.filter(h=>h.roundId!==round.id);
  state.history.push({roundId:round.id,passed,correct,total,score:state.quiz.score});
  if(passed)state.unlockedRoundIndex=Math.max(state.unlockedRoundIndex,state.currentRoundIndex+1);
  state.screen="roundResult";
  state.lastResult={passed,correct,total,score:state.quiz.score};
  render();
}

function renderRoundResult(){
  const ROUNDS=getRounds();
  const medals=getMedalIcons();
  const round=currentRound();
  const r=state.lastResult;
  const isLastRound=state.currentRoundIndex===ROUNDS.length-1;
  const isHard=state.difficulty==="hard";
  let starsHtml="";
  const starCount=r.correct/r.total>=0.9?3:(r.correct/r.total>=0.7?2:(r.passed?1:0));
  for(let i=0;i<3;i++) starsHtml+=i<starCount?"⭐":"☆";
  if(r.passed){
    const nextBtn=isLastRound
      ?`<button class="btn btn-primary" id="btnToFinal">🏆 Xem kết quả chung cuộc</button>`
      :`<button class="btn ${isHard?'btn-hard':'btn-primary'}" id="btnNextRound">🔓 Mở Vòng ${state.currentRoundIndex+2}: ${ROUNDS[state.currentRoundIndex+1].title}</button>`;
    return `<div class="card result">
      <div class="medal">${medals[state.currentRoundIndex]||"🏅"}</div>
      <h2>Chinh phục thành công!</h2>
      <div class="result-sub">Vòng ${state.currentRoundIndex+1}: ${round.title}</div>
      <div class="stars">${starsHtml}</div>
      <div class="stat-row">
        <div class="stat-box"><div class="num">${r.correct}/${r.total}</div><div class="lab">Câu đúng</div></div>
        <div class="stat-box"><div class="num">${r.score}</div><div class="lab">Điểm số</div></div>
      </div>
      ${nextBtn}
      <button class="btn btn-secondary" id="btnHome">🏠 Về trang chính</button>
    </div>`;
  } else {
    return `<div class="card result">
      <div class="medal">😅</div>
      <h2>Gần được rồi!</h2>
      <div class="result-sub">Vòng ${state.currentRoundIndex+1}: ${round.title}</div>
      <div class="fail-box">
        <div class="ft">Chưa đạt yêu cầu để mở vòng tiếp theo</div>
        <div class="fd">Cần đúng tối thiểu ${Math.round(round.passRatio*100)}% câu hỏi và không hết mạng.</div>
      </div>
      <div class="stat-row">
        <div class="stat-box"><div class="num">${r.correct}/${r.total}</div><div class="lab">Câu đúng</div></div>
        <div class="stat-box"><div class="num">${r.score}</div><div class="lab">Điểm số</div></div>
      </div>
      <button class="btn btn-primary" id="btnRetryRound">🔄 Thi lại Vòng ${state.currentRoundIndex+1} (câu hỏi mới)</button>
      <button class="btn btn-secondary" id="btnHome">🏠 Về trang chính</button>
    </div>`;
  }
}

function renderFinalResult(){
  const ROUNDS=getRounds();
  const medals=getMedalIcons();
  const passedCount=state.history.filter(h=>h.passed).length;
  const totalScore=state.history.reduce((s,h)=>s+(h.score||0),0);
  const allPassed=passedCount>=ROUNDS.length;
  const isHard=state.difficulty==="hard";
  let medalsHtml="";
  ROUNDS.forEach((r,idx)=>{
    const h=state.history.find(x=>x.roundId===r.id);
    const got=h&&h.passed;
    medalsHtml+=`<div class="final-medal ${got?'got':''}${got&&isHard?' hard':''}">${got?(medals[idx]||"🏅"):"▫️"}</div>`;
  });
  const showLevelUp=allPassed&&state.difficulty==="normal";
  return `<div class="card result">
    <div class="medal">${allPassed?(isHard?"🏅":"🏆"):"🎒"}</div>
    <h2>${allPassed?(isHard?"🔥 Quán Quân Cấp Độ Khó!":"🏆 Quán Quân Đấu Trường Anh Ngữ!"):"Hành trình tạm dừng ở đây"}</h2>
    <div class="result-sub">${allPassed?`Bạn đã hoàn thành tất cả ${ROUNDS.length} vòng thi — ${isHard?"Cấp KHÓ":"Cấp THƯỜNG"}!`:"Hãy quay lại chinh phục các vòng còn lại nhé!"}</div>
    <div class="final-medal-grid">${medalsHtml}</div>
    <div class="stat-row">
      <div class="stat-box"><div class="num">${passedCount}/${ROUNDS.length}</div><div class="lab">Vòng đạt</div></div>
      <div class="stat-box"><div class="num">${totalScore}</div><div class="lab">Tổng điểm</div></div>
    </div>
    ${showLevelUp?`<div style="background:linear-gradient(135deg,#F4E6FF,#E8F0FF);border:2px solid var(--purple);border-radius:16px;padding:14px;text-align:center;margin-bottom:14px;">
      <div style="font-family:'Baloo 2',cursive;font-weight:800;color:var(--purple-deep);font-size:1rem;margin-bottom:4px;">🔥 Bạn đã mở khóa Cấp KHÓ!</div>
      <div style="font-size:0.8rem;font-weight:700;color:#7a5a8a;">Về trang chủ và chọn Cấp KHÓ để thử thách tiếp nhé!</div>
    </div>`:''}
    <button class="btn ${isHard?'btn-hard':'btn-primary'}" id="btnPlayAgain">🔁 Chơi lại ${isHard?'(Cấp KHÓ)':'(câu hỏi mới)'}</button>
    <button class="btn btn-teal" id="btnHome" style="margin-top:12px;">🏠 Về trang chủ chọn cấp độ</button>
  </div>`;
}

function renderLevelUp(){
  return `<div class="card">
    <div class="levelup-screen">
      <span class="levelup-anim">🏆</span>
      <h2>Bạn đã chinh phục cấp THƯỜNG!</h2>
      <p class="levelup-sub">Tuyệt vời! Hãy tiếp tục ôn luyện hoặc thử thách bản thân<br>với bộ câu hỏi hoàn toàn mới ở cấp độ khó hơn!</p>
      <div class="difficulty-choice">
        <div class="diff-card normal-diff" id="chooseNormal">
          <div class="diff-icon">🟢</div>
          <div class="diff-title">Chơi lại Cấp Thường</div>
          <div class="diff-desc">30 câu/vòng · Câu hỏi quen thuộc · Phù hợp ôn luyện</div>
          <span class="diff-tag easy">Cấp thường</span>
        </div>
        <div class="diff-card hard-diff" id="chooseHard">
          <div class="diff-icon">🔥</div>
          <div class="diff-title">Nâng cấp độ KHÓ</div>
          <div class="diff-desc">Từ vựng mới · Ngữ pháp nâng cao · Đọc/Nghe phức tạp hơn · Thời gian ngắn hơn</div>
          <span class="diff-tag hard-tag">🔥 Thử thách</span>
        </div>
      </div>
      <button class="btn btn-secondary" id="btnHome">🏠 Về trang chính</button>
    </div>
  </div>`;
}

function goHome(){
  if(state.screen==="quiz"){
    const ok=confirm("Bạn có chắc muốn về trang chủ? Tiến trình của vòng thi này sẽ không được lưu.");
    if(!ok)return;
  }
  state.screen="home";
  render();
}

function attachHandlers(){
  const b=id=>document.getElementById(id);
  if(b('pickNormal')) b('pickNormal').onclick=()=>{
    if(state.difficulty!=="normal"){state.difficulty="normal";fullReset();render();}
  };
  if(b('pickHard')) b('pickHard').onclick=()=>{
    if(state.difficulty!=="hard"){state.difficulty="hard";fullReset();render();}
  };
  if(b('btnStart')) b('btnStart').onclick=()=>startRound(0);
  if(b('btnRestart')) b('btnRestart').onclick=()=>{fullReset();startRound(0);};
  if(b('btnReset')) b('btnReset').onclick=()=>{fullReset();render();};
  if(b('btnNextRound')) b('btnNextRound').onclick=()=>startRound(state.currentRoundIndex+1);
  if(b('btnRetryRound')) b('btnRetryRound').onclick=()=>startRound(state.currentRoundIndex);
  if(b('btnToFinal')) b('btnToFinal').onclick=()=>{state.screen="finalResult";render();};
  if(b('btnHome')) b('btnHome').onclick=()=>goHome();
  if(b('btnHomeMini')) b('btnHomeMini').onclick=()=>goHome();
  if(b('btnPlayAgain')) b('btnPlayAgain').onclick=()=>{fullReset();startRound(0);};
  if(b('btnLevelUp')) b('btnLevelUp').onclick=()=>{state.screen="levelup";render();};
  if(b('btnSwitchNormal')) b('btnSwitchNormal').onclick=()=>{state.difficulty="normal";fullReset();state.screen="home";render();};
  if(b('chooseNormal')) b('chooseNormal').onclick=()=>{state.difficulty="normal";fullReset();startRound(0);};
  if(b('chooseHard')) b('chooseHard').onclick=()=>{state.difficulty="hard";fullReset();startRound(0);};
  document.querySelectorAll('.round-pill.clickable').forEach(pill=>{
    pill.onclick=()=>startRound(parseInt(pill.getAttribute('data-idx'),10));
  });
  document.querySelectorAll('.stage-dot.clickable-dot').forEach(dot=>{
    dot.onclick=()=>{
      const idx=parseInt(dot.getAttribute('data-stage-idx'),10);
      if(idx===state.currentRoundIndex)return;
      const ok=confirm("Chuyển sang vòng thi khác? Tiến trình của vòng hiện tại sẽ không được lưu.");
      if(!ok)return;
      startRound(idx);
    };
  });
  document.querySelectorAll('.voice-gender-btn').forEach(btn=>{
    btn.onclick=()=>{
      const gender=btn.getAttribute('data-gender');
      if(gender===state.voiceGender)return;
      setVoiceGender(gender);
    };
  });
  if(b('btnSound')) b('btnSound').onclick=()=>{
    state.soundOn=!state.soundOn;
    window.speechSynthesis&&window.speechSynthesis.cancel();
    render();
  };
  const optWrap=document.getElementById('optionsWrap');
  if(optWrap) optWrap.querySelectorAll('.opt').forEach(btn=>{
    btn.onclick=()=>handleAnswer(decodeURIComponent(btn.getAttribute('data-choice')));
  });
}

function fullReset(){
  state.unlockedRoundIndex=0;
  state.history=[];
  ROUNDS_NORMAL.forEach(r=>{r.bank=shuffle(r.bank);});
  ROUNDS_HARD.forEach(r=>{r.bank=shuffle(r.bank);});
}

render();
</script>
</body>
</html>
