<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập / Đăng ký – Học Vui</title>
<style>
  :root{
    --navy:#0b1f3a; --blue:#1565C0; --blue2:#2563eb; --sky:#38bdf8;
    --gold:#ffb627; --ink:#1c2b3a; --muted:#64748b; --bg:#F0F6FF; --border:#e2e8f0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:linear-gradient(135deg,var(--navy) 0%, var(--blue) 55%, var(--sky) 100%);
    min-height:100vh;
    display:flex; align-items:center; justify-content:center;
    padding:24px;
    position:relative;
    overflow-x:hidden;
  }
  .bg-shape{position:absolute;font-size:44px;opacity:0.15;pointer-events:none;}
  .bs1{top:8%;left:8%;} .bs2{bottom:10%;right:10%;font-size:60px;} .bs3{top:60%;left:4%;font-size:30px;}

  .auth-wrap{position:relative;z-index:1;width:100%;max-width:420px;}
  .auth-logo{text-align:center;margin-bottom:20px;}
  .auth-logo a{color:#fff;font-weight:800;font-size:1.3rem;text-decoration:none;display:inline-flex;align-items:center;gap:8px;}

  .auth-card{background:#fff;border-radius:24px;box-shadow:0 24px 60px rgba(0,0,0,0.25);padding:30px 26px 28px;}

  .auth-tabs{display:flex;background:var(--bg);border-radius:14px;padding:4px;margin-bottom:22px;}
  .auth-tab{flex:1;text-align:center;padding:10px;border-radius:11px;font-size:13.5px;font-weight:800;color:var(--muted);cursor:pointer;transition:all .15s;}
  .auth-tab.active{background:#fff;color:var(--navy);box-shadow:0 2px 8px rgba(11,31,58,0.12);}

  .auth-panel{display:none;}
  .auth-panel.active{display:block;animation:fadeIn .2s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:translateY(0);}}

  h2.auth-title{font-size:1.15rem;font-weight:800;color:var(--navy);margin-bottom:4px;}
  .auth-sub{font-size:12.5px;color:var(--muted);margin-bottom:20px;}

  .field{margin-bottom:15px;text-align:left;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:#334155;margin-bottom:6px;}
  .field input, .field select{width:100%;padding:12px 14px;border-radius:11px;border:1.5px solid var(--border);font-size:14px;font-family:inherit;}
  .field input:focus{outline:none;border-color:var(--blue);box-shadow:0 0 0 3px rgba(21,101,192,0.12);}

  .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:13px;border-radius:12px;font-size:14.5px;font-weight:800;border:none;cursor:pointer;font-family:inherit;transition:all .15s;}
  .btn-primary{background:linear-gradient(135deg,var(--navy),var(--blue2));color:#fff;margin-top:6px;}
  .btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 20px rgba(21,101,192,0.3);}
  .btn-google{background:#fff;color:#1c2b3a;border:1.5px solid var(--border);margin-top:10px;}
  .btn-google:hover{background:#f8fafc;}
  .btn-link{background:none;border:none;color:var(--blue);font-size:12.5px;font-weight:700;cursor:pointer;padding:0;}

  .divider{display:flex;align-items:center;gap:10px;margin:18px 0 4px;color:var(--muted);font-size:11.5px;font-weight:700;}
  .divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border);}

  .forgot-row{text-align:right;margin:-8px 0 14px;}
  .error-box{background:#fdecec;color:#c0392b;font-size:12.5px;font-weight:700;padding:10px 12px;border-radius:10px;margin-bottom:14px;display:none;}
  .error-box.show{display:block;}

  .code-row{display:flex;gap:8px;}
  .code-row input{text-align:center;letter-spacing:4px;font-weight:800;}
  .code-hint{background:#FFF8E8;border:1px dashed #ffb627;color:#8a5a00;font-size:11.5px;font-weight:600;padding:9px 11px;border-radius:10px;margin-bottom:14px;display:none;}
  .code-hint.show{display:block;}

  .back-home{display:block;text-align:center;margin-top:18px;color:rgba(255,255,255,0.85);font-size:12.5px;text-decoration:none;font-weight:600;}
  .back-home:hover{color:#fff;}

  .admin-note{margin-top:14px;font-size:11px;color:#94a3b8;text-align:center;line-height:1.5;}

  .hv-account-widget{display:none;}
</style>
</head>
<body>

<span class="bg-shape bs1">📚</span>
<span class="bg-shape bs2">🔐</span>
<span class="bg-shape bs3">✨</span>

<div class="auth-wrap">
  <div class="auth-logo"><a href="index.html">🎓 Học Vui</a></div>

  <div class="auth-card">
    <div class="auth-tabs">
      <div class="auth-tab active" data-tab="login" id="tabLogin">Đăng nhập</div>
      <div class="auth-tab" data-tab="register" id="tabRegister">Đăng ký</div>
    </div>

    <!-- LOGIN PANEL -->
    <div class="auth-panel active" id="panelLogin">
      <h2 class="auth-title">Chào mừng trở lại 👋</h2>
      <p class="auth-sub">Đăng nhập để tiếp tục học tập.</p>

      <div class="error-box" id="loginError"></div>

      <div id="loginPasswordMode">
        <form id="loginForm">
          <div class="field">
            <label>Email</label>
            <input type="email" id="loginEmail" placeholder="ban@email.com" required>
          </div>
          <div class="field">
            <label>Mật khẩu</label>
            <input type="password" id="loginPassword" placeholder="••••••••" required>
          </div>
          <div class="forgot-row">
            <button type="button" class="btn-link" id="forgotBtn">Quên mật khẩu?</button>
          </div>
          <button type="submit" class="btn btn-primary">Đăng nhập</button>
        </form>

        <div class="divider">HOẶC</div>
        <button type="button" class="btn btn-google" id="googleLoginBtn">
          <span>🔵</span> Đăng nhập với Google
        </button>
        <button type="button" class="btn btn-google" id="emailCodeToggleBtn" style="margin-top:8px;">
          <span>✉️</span> Đăng nhập bằng mã gửi qua email
        </button>
      </div>

      <div id="loginCodeMode" style="display:none;">
        <p class="auth-sub" style="margin-top:-6px;">Nhập email để nhận mã xác thực gồm 6 chữ số.</p>
        <div class="field">
          <label>Email</label>
          <input type="email" id="codeEmail" placeholder="ban@email.com">
        </div>
        <button type="button" class="btn btn-primary" id="sendCodeBtn">Gửi mã xác thực</button>

        <div class="code-hint" id="codeHint"></div>

        <div id="codeInputArea" style="display:none;margin-top:14px;">
          <div class="field">
            <label>Nhập mã 6 chữ số</label>
            <div class="code-row">
              <input type="text" id="codeInput" maxlength="6" placeholder="123456">
            </div>
          </div>
          <button type="button" class="btn btn-primary" id="verifyCodeBtn">Xác thực & đăng nhập</button>
        </div>

        <button type="button" class="btn-link" style="margin-top:14px;" id="backToPasswordBtn">← Quay lại đăng nhập bằng mật khẩu</button>
      </div>

      <p class="admin-note">Demo quản trị: admin@hocvui.com / admin123</p>
    </div>

    <!-- REGISTER PANEL -->
    <div class="auth-panel" id="panelRegister">
      <h2 class="auth-title">Tạo tài khoản mới ✨</h2>
      <p class="auth-sub">Chỉ mất chưa đến một phút.</p>

      <div class="error-box" id="registerError"></div>

      <form id="registerForm">
        <div class="field">
          <label>Họ và tên</label>
          <input type="text" id="regName" placeholder="Nguyễn Văn A" required>
        </div>
        <div class="field">
          <label>Email</label>
          <input type="email" id="regEmail" placeholder="ban@email.com" required>
        </div>
        <div class="field">
          <label>Mật khẩu</label>
          <input type="password" id="regPassword" placeholder="Tối thiểu 4 ký tự" required>
        </div>
        <div class="field">
          <label>Xác nhận mật khẩu</label>
          <input type="password" id="regPassword2" placeholder="Nhập lại mật khẩu" required>
        </div>
        <button type="submit" class="btn btn-primary">Tạo tài khoản</button>
      </form>

      <div class="divider">HOẶC</div>
      <button type="button" class="btn btn-google" id="googleRegisterBtn">
        <span>🔵</span> Đăng ký với Google
      </button>
    </div>
  </div>

  <a href="index.html" class="back-home">← Về trang chủ</a>
</div>

<script src="js/auth.js"></script>
<script>
  // If already logged in, bounce straight to the redirect target (or home)
  (function(){
    var redirect = HV.qs('redirect');
    if (HV.isLoggedIn()) {
      window.location.href = redirect ? decodeURIComponent(redirect) : 'index.html';
    }
  })();

  var tabLogin = document.getElementById('tabLogin');
  var tabRegister = document.getElementById('tabRegister');
  var panelLogin = document.getElementById('panelLogin');
  var panelRegister = document.getElementById('panelRegister');

  function activateTab(name){
    var isLogin = name === 'login';
    tabLogin.classList.toggle('active', isLogin);
    tabRegister.classList.toggle('active', !isLogin);
    panelLogin.classList.toggle('active', isLogin);
    panelRegister.classList.toggle('active', !isLogin);
  }
  tabLogin.addEventListener('click', function(){ activateTab('login'); });
  tabRegister.addEventListener('click', function(){ activateTab('register'); });

  if (HV.qs('tab') === 'register') activateTab('register');

  function goAfterAuth(){
    var redirect = HV.qs('redirect');
    window.location.href = redirect ? decodeURIComponent(redirect) : 'index.html';
  }

  function showError(id, msg){
    var el = document.getElementById(id);
    el.textContent = msg;
    el.classList.add('show');
  }
  function hideError(id){
    document.getElementById(id).classList.remove('show');
  }

  // ---- password login ----
  document.getElementById('loginForm').addEventListener('submit', function(e){
    e.preventDefault();
    hideError('loginError');
    var email = document.getElementById('loginEmail').value;
    var password = document.getElementById('loginPassword').value;
    var res = HV.login(email, password);
    if (res.ok) {
      HV.toast(res.message, 'success');
      setTimeout(goAfterAuth, 400);
    } else {
      showError('loginError', res.message);
    }
  });

  // ---- register ----
  document.getElementById('registerForm').addEventListener('submit', function(e){
    e.preventDefault();
    hideError('registerError');
    var name = document.getElementById('regName').value;
    var email = document.getElementById('regEmail').value;
    var password = document.getElementById('regPassword').value;
    var password2 = document.getElementById('regPassword2').value;
    if (password !== password2) {
      showError('registerError', 'Mật khẩu xác nhận không khớp.');
      return;
    }
    var res = HV.register({ name: name, email: email, password: password });
    if (res.ok) {
      HV.toast(res.message, 'success');
      setTimeout(goAfterAuth, 400);
    } else {
      showError('registerError', res.message);
    }
  });

  // ---- forgot password (fully simulated) ----
  document.getElementById('forgotBtn').addEventListener('click', function(){
    var email = document.getElementById('loginEmail').value || prompt('Nhập email để đặt lại mật khẩu:');
    if (!email) return;
    HV.toast('Nếu email tồn tại, liên kết đặt lại mật khẩu đã được gửi (demo).', 'info', 4000);
  });

  // ---- google (simulated — needs real Firebase Auth in production) ----
  function fakeGoogleClick(){
    HV.toast('Demo: đăng nhập Google cần tích hợp Firebase Auth ở bản chính thức.', 'info', 4200);
  }
  document.getElementById('googleLoginBtn').addEventListener('click', fakeGoogleClick);
  document.getElementById('googleRegisterBtn').addEventListener('click', fakeGoogleClick);

  // ---- email code login (simulated) ----
  var DEMO_CODE = '123456';
  document.getElementById('emailCodeToggleBtn').addEventListener('click', function(){
    document.getElementById('loginPasswordMode').style.display = 'none';
    document.getElementById('loginCodeMode').style.display = 'block';
  });
  document.getElementById('backToPasswordBtn').addEventListener('click', function(){
    document.getElementById('loginCodeMode').style.display = 'none';
    document.getElementById('loginPasswordMode').style.display = 'block';
    document.getElementById('codeInputArea').style.display = 'none';
    document.getElementById('codeHint').classList.remove('show');
  });
  document.getElementById('sendCodeBtn').addEventListener('click', function(){
    var email = document.getElementById('codeEmail').value;
    if (!email) { HV.toast('Vui lòng nhập email trước.', 'error'); return; }
    var hint = document.getElementById('codeHint');
    hint.textContent = '📩 Đã gửi mã xác thực đến ' + email + ' (demo). Mã demo: ' + DEMO_CODE;
    hint.classList.add('show');
    document.getElementById('codeInputArea').style.display = 'block';
    HV.toast('Đã gửi mã xác thực (demo).', 'success');
  });
  document.getElementById('verifyCodeBtn').addEventListener('click', function(){
    var email = document.getElementById('codeEmail').value;
    var code = document.getElementById('codeInput').value.trim();
    if (code !== DEMO_CODE) {
      HV.toast('Mã xác thực không đúng.', 'error');
      return;
    }
    var res = HV.loginPasswordless(email);
    if (res.ok) {
      HV.toast(res.message, 'success');
      setTimeout(goAfterAuth, 400);
    } else {
      HV.toast(res.message, 'error');
    }
  });
</script>

</body>
</html>
