<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tài khoản của tôi – Học Vui</title>
<style>
  :root{
    --navy:#0b1f3a; --blue:#1565C0; --blue2:#2563eb; --sky:#38bdf8;
    --gold:#ffb627; --mint:#2ec4b6; --ink:#1c2b3a; --muted:#64748b; --bg:#F0F6FF; --border:#e2e8f0;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}

  .topbar{background:linear-gradient(135deg,var(--navy),var(--blue));padding:26px 20px 60px;text-align:center;}
  .topbar a.logo{color:#fff;font-weight:800;font-size:1.15rem;text-decoration:none;}

  main{max-width:840px;margin:-36px auto 60px;padding:0 18px;}

  .profile-card{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap;}
  .avatar-lg{width:64px;height:64px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--sky));color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:800;flex-shrink:0;}
  .avatar-lg.admin{background:linear-gradient(135deg,var(--gold),#ff6b6b);}
  .profile-info{flex:1;min-width:180px;}
  .profile-name{font-size:1.1rem;font-weight:800;color:var(--navy);}
  .profile-email{font-size:0.85rem;color:var(--muted);margin-top:2px;}
  .role-pill{display:inline-block;margin-top:8px;font-size:10.5px;font-weight:800;text-transform:uppercase;letter-spacing:.4px;padding:4px 10px;border-radius:20px;background:#E3F2FD;color:#0D47A1;}
  .role-pill.admin{background:#FFF3E0;color:#BF360C;}

  .card{background:#fff;border-radius:20px;border:1.5px solid var(--border);box-shadow:0 2px 14px rgba(11,31,58,0.06);padding:22px;margin-bottom:20px;}
  .card h3{font-size:1rem;font-weight:800;margin-bottom:16px;color:var(--navy);display:flex;align-items:center;justify-content:space-between;}

  .edit-btn{font-size:12px;font-weight:700;color:var(--blue);background:none;border:none;cursor:pointer;}

  #profileEditForm{display:none;margin-top:14px;}
  #profileEditForm.show{display:block;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12px;font-weight:700;color:#334155;margin-bottom:6px;}
  .field input{width:100%;padding:11px 13px;border-radius:10px;border:1.5px solid var(--border);font-size:13.5px;font-family:inherit;}
  .save-btn{padding:10px 18px;border-radius:10px;border:none;background:var(--navy);color:#fff;font-weight:700;font-size:12.5px;cursor:pointer;}

  .admin-banner{background:linear-gradient(135deg,var(--gold),#ffd166);border-radius:16px;padding:16px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
  .admin-banner div strong{color:#5c3a00;display:block;font-size:0.92rem;}
  .admin-banner div span{color:#7a5200;font-size:0.78rem;}
  .admin-banner a{background:#0b1f3a;color:#fff;padding:10px 16px;border-radius:10px;font-size:12.5px;font-weight:800;text-decoration:none;white-space:nowrap;}

  .courses-list{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  @media (max-width:560px){ .courses-list{grid-template-columns:1fr;} }
  .mini-course{border:1.5px solid var(--border);border-radius:14px;padding:14px;display:flex;gap:10px;align-items:center;}
  .mini-course .ic{width:38px;height:38px;border-radius:10px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;}
  .mini-course .title{font-size:0.85rem;font-weight:700;color:var(--navy);line-height:1.35;}
  .mini-course a{font-size:11.5px;font-weight:700;color:var(--blue);text-decoration:none;}

  .empty-state{text-align:center;padding:26px 16px;color:var(--muted);font-size:0.85rem;}
  .empty-state a{color:var(--blue);font-weight:700;text-decoration:none;}

  .hv-table-wrap{overflow-x:auto;border-radius:14px;border:1.5px solid var(--border);}
  .hv-table{width:100%;border-collapse:collapse;font-size:12.5px;min-width:480px;}
  .hv-table th{text-align:left;background:var(--bg);color:#334155;font-weight:800;padding:10px 12px;font-size:10.5px;text-transform:uppercase;}
  .hv-table td{padding:11px 12px;border-top:1px solid #f1f5f9;}

  .logout-btn{width:100%;padding:13px;border-radius:12px;border:1.5px solid #fbdada;background:#fdecec;color:#c0392b;font-weight:800;font-size:13.5px;cursor:pointer;}
</style>
</head>
<body>

<div class="topbar"><a href="index.html" class="logo">🎓 Học Vui</a></div>

<main id="mainContent" style="display:none;">

  <div class="card profile-card" id="profile">
    <div id="avatarBox"></div>
    <div class="profile-info">
      <div class="profile-name" id="pName">—</div>
      <div class="profile-email" id="pEmail">—</div>
      <span class="role-pill" id="pRole">—</span>
    </div>
    <button class="edit-btn" id="editProfileBtn">✏️ Chỉnh sửa</button>
  </div>

  <div class="card">
    <form id="profileEditForm">
      <div class="field">
        <label>Họ và tên</label>
        <input type="text" id="editName">
      </div>
      <button type="submit" class="save-btn">Lưu thay đổi</button>
    </form>
  </div>

  <div class="admin-banner" id="adminBanner" style="display:none;">
    <div>
      <strong>🛠️ Bạn là Quản trị viên</strong>
      <span>Quản lý khóa học, mã giảm giá, đơn hàng và người dùng.</span>
    </div>
    <a href="admin.html">Vào trang quản trị →</a>
  </div>

  <div class="card">
    <h3>📚 Khóa học của tôi</h3>
    <div id="myCoursesList"></div>
  </div>

  <div class="card">
    <h3>🧾 Lịch sử đơn hàng</h3>
    <div id="ordersBox"></div>
  </div>

  <button class="logout-btn" id="logoutBtn">🚪 Đăng xuất</button>

</main>

<script src="js/auth.js"></script>
<script>
  if (HV.requireLogin('account.html')) {
    document.getElementById('mainContent').style.display = 'block';
    renderAccount();
  }

  function renderAccount(){
    var u = HV.currentUser();
    var admin = u.role === 'admin';

    document.getElementById('avatarBox').innerHTML =
      '<div class="avatar-lg' + (admin ? ' admin' : '') + '">' + HV.escapeHtml(HV.initials(u.name)) + '</div>';
    document.getElementById('pName').textContent = u.name;
    document.getElementById('pEmail').textContent = u.email;
    var roleEl = document.getElementById('pRole');
    roleEl.textContent = admin ? 'Quản trị viên' : 'Khách hàng';
    roleEl.classList.toggle('admin', admin);

    document.getElementById('editName').value = u.name;
    if (admin) document.getElementById('adminBanner').style.display = 'flex';

    // my courses
    var courses = HV.getCourses();
    var owned = courses.filter(function(c){ return HV.hasPurchased(c.id); });
    var listEl = document.getElementById('myCoursesList');
    if (owned.length === 0) {
      listEl.innerHTML = '<div class="empty-state">Bạn chưa sở hữu khóa học nào. <a href="index.html">Khám phá khóa học →</a></div>';
    } else {
      listEl.innerHTML = '<div class="courses-list">' + owned.map(function(c){
        return '<div class="mini-course"><div class="ic">' + c.icon + '</div><div style="flex:1;"><div class="title">' + HV.escapeHtml(c.title) + '</div><a href="' + HV.escapeHtml(c.file) + '">Vào học →</a></div></div>';
      }).join('') + '</div>';
    }

    // orders
    var orders = HV.getOrders().filter(function(o){ return o.userEmail === u.email; });
    var ordersBox = document.getElementById('ordersBox');
    if (orders.length === 0) {
      ordersBox.innerHTML = '<div class="empty-state">Chưa có đơn hàng nào.</div>';
    } else {
      var rows = orders.map(function(o){
        return '<tr><td>#' + HV.escapeHtml(o.id) + '</td><td>' + HV.escapeHtml(o.courseTitle) + '</td><td>' + HV.formatDate(o.date) + '</td><td>' + (o.discountCode ? HV.escapeHtml(o.discountCode) : '—') + '</td><td>' + HV.formatVND(o.amount) + '</td></tr>';
      }).join('');
      ordersBox.innerHTML = '<div class="hv-table-wrap"><table class="hv-table"><thead><tr><th>Mã đơn</th><th>Khóa học</th><th>Ngày mua</th><th>Mã giảm giá</th><th>Số tiền</th></tr></thead><tbody>' + rows + '</tbody></table></div>';
    }
  }

  document.getElementById('editProfileBtn').addEventListener('click', function(){
    document.getElementById('profileEditForm').classList.toggle('show');
  });

  document.getElementById('profileEditForm').addEventListener('submit', function(e){
    e.preventDefault();
    var name = document.getElementById('editName').value.trim();
    if (!name) { HV.toast('Vui lòng nhập họ tên.', 'error'); return; }
    var res = HV.updateProfile({ name: name });
    if (res.ok) {
      HV.toast(res.message, 'success');
      document.getElementById('profileEditForm').classList.remove('show');
      renderAccount();
      HV.renderAccountWidget();
    }
  });

  document.getElementById('logoutBtn').addEventListener('click', function(){
    HV.logout();
    HV.toast('Đã đăng xuất.', 'info');
    setTimeout(function(){ window.location.href = 'index.html'; }, 500);
  });

  // deep-link to #profile just scrolls there (already visible by default)
  if (window.location.hash === '#profile') {
    setTimeout(function(){
      document.getElementById('profile').scrollIntoView({behavior:'smooth', block:'start'});
    }, 200);
  }
</script>

</body>
</html>
