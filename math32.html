// ============================================================
//  TIỆN ÍCH
// ============================================================
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function shuffle(arr){ return [...arr].sort(()=>Math.random()-0.5); }
function pick(arr){ return arr[rnd(0,arr.length-1)]; }

function mcq(question, correct, wrongs, icon, hint){
  const opts = shuffle([String(correct), ...wrongs.map(String)]).slice(0,4);
  if(!opts.includes(String(correct))) opts[0]=String(correct);
  return { type:'mcq', question, correct:String(correct), options:shuffle(opts), icon, hint };
}
function fill(question, correct, icon, hint){
  return { type:'fill', question, correct:String(correct), icon, hint };
}

function numWords(n){
  if(n===0) return 'không';
  const ones=['','một','hai','ba','bốn','năm','sáu','bảy','tám','chín'];
  const teens=['mười','mười một','mười hai','mười ba','mười bốn','mười lăm','mười sáu','mười bảy','mười tám','mười chín'];
  if(n<10) return ones[n];
  if(n<20) return teens[n-10];
  if(n<100){
    const t=['','','hai mươi','ba mươi','bốn mươi','năm mươi','sáu mươi','bảy mươi','tám mươi','chín mươi'];
    const r=n%10;
    return t[Math.floor(n/10)]+(r?` ${r===1?'mốt':r===5?'lăm':ones[r]}`:'');
  }
  if(n<1000){
    const h=Math.floor(n/100), rest=n%100;
    return ones[h]+' trăm'+(rest?' '+numWords(rest):'');
  }
  if(n<10000){
    const th=Math.floor(n/1000), rest=n%1000;
    return numWords(th)+' nghìn'+(rest?(rest<100?' không trăm '+numWords(rest):' '+numWords(rest)):'');
  }
  return String(n);
}

    medium:()=>{
      const a=rnd(2000,8000),b=a+rnd(1,500);

    medium:()=>{
      const n=rnd(1100,8900);
      const rounded=Math.round(n/1000)*1000;
      return mcq(`${n} làm tròn đến hàng nghìn là?`, rounded, [rounded+1000,rounded-1000,rounded+500], '🔢', 'Làm tròn đến hàng nghìn');

      const n=rnd(1500,9500);

      // ── V1: So sánh xác suất 2 màu bi ────────────────────────────
      if(variant===1){

        </svg>`;
        const q=mcq(`Hộp có ${blue} bi xanh và ${red} bi đỏ.\nLấy ngẫu nhiên 1 bi – màu nào có P cao hơn?`,`Xanh (${blue}/${total})`,['Bằng nhau',`Đỏ (${red}/${total})`,`Không tính được`],'🎲',`P(xanh)=${blue}/${total} > P(đỏ)=${red}/${total}`);

      }

      // ── V2: Vòng quay nhiều màu ───────────────────────────────────
      if(variant===2){
        const totalSec=pick([4,6,8]);

          {n:greenSec,fill:'#4CAF50'},

          {n:yellowSec,fill:'#FDD835'}
        ].filter(s=>s.n>0);
        let cumAngle=-90;
        const sectorPaths=sectors.map(s=>{

          const y1=cy+r*Math.sin(toRad(cumAngle));
          const x2=cx+r*Math.cos(toRad(cumAngle+sweep));

          <text x="132" y="141" font-size="11" fill="#1C2B3A" text-anchor="middle">Rút ngẫu nhiên 1 lá – P(${target}) = ?</text>
          <text x="132" y="158" font-size="10" fill="#888" text-anchor="middle">${cnt} lá / 52 lá tổng</text>
        </svg>`;
        const frac=cnt===26?'26/52 (= 1/2)':'13/52 (= 1/4)';
        const q=mcq(`Bộ bài 52 lá. Rút ngẫu nhiên 1 lá.\nXác suất ra lá ${target} là?`,frac,['1/52','2/52','1/13'],'🎲',`${cnt} lá ${target} trong 52 → ${frac}`);
        q.svg=svg; return q;
      }

      // ── V4: Hộp bóng màu – tính xác suất bằng phân số ───────────
      if(variant===4){
        const colors=[
          {name:'đỏ',fill:'#EF5350',n:rnd(2,5)},
          {name:'xanh',fill:'#42A5F5',n:rnd(2,5)},

        const total=colors.reduce((s,c)=>s+c.n,0);

        const svg=`<svg width="260" height="172" viewBox="0 0 260 172" xmlns="http://www.w3.org/2000/svg">
          <text x="130" y="14" font-size="11" font-weight="700" fill="#1C2B3A" text-anchor="middle">Hộp: ${colors.map(c=>c.n+' '+c.name).join(' · ')} = ${total} bóng</text>
          <rect x="22" y="24" width="216" height="80" rx="12" fill="#F5F5F5" stroke="#90A4AE" stroke-width="2"/>

            <circle cx="${40+ci*80+i*16}" cy="${64}" r="14" fill="${c.fill}" stroke="rgba(0,0,0,0.15)" stroke-width="1.5"/>

          <rect x="22" y="132" width="216" height="14" rx="7" fill="#EEE"/>
          <rect x="22" y="132" width="${Math.round(216*target.n/total)}" height="14" rx="7" fill="${target.fill}"/>
          <text x="130" y="158" font-size="11" font-weight="700" fill="${target.fill}" text-anchor="middle">P(${target.name}) = ${target.n}/${total}</text>

        const q=mcq(`Hộp ${colors.map(c=>c.n+' bóng '+c.name).join(', ')}.\nLấy ngẫu nhiên 1 bóng – P(${target.name}) = ?`,`${target.n}/${total}`,wrong.slice(0,3),'🎲',`${target.n} bóng ${target.name} trong ${total} bóng → ${target.n}/${total}`);
        q.svg=svg; return q;

      // ── V5: Bình thăm – ai trúng thưởng ─────────────────────────
      const total=pick([5,8,10]);
      const prizes=rnd(1,Math.floor(total/2));
      const names=['An','Bình','Chi','Duy','Em'];
      const svg=`<svg width="260" height="168" viewBox="0 0 260 168" xmlns="http://www.w3.org/2000/svg">

        ${Array.from({length:Math.min(total-prizes,4)},(_,i)=>`<rect x="${68+(prizes+i)*30}" y="${65}" width="22" height="30" rx="4" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1.5"/><text x="${79+(prizes+i)*30}" y="${84}" font-size="9" text-anchor="middle" fill="#888">✗</text>`).join('')}

    // ─────────────────────────────────────────────────────────────────
    // KHÓ: 6 variant – thực nghiệm, tần số, dự đoán, phân tích bảng
    // ─────────────────────────────────────────────────────────────────
    hard:()=>{
      const variant = rnd(0,5);

      // ── V0: Tung xu N lần – tính tần số tương đối ────────────────
      if(variant===0){
        const total=pick([20,30,40]);
        const heads=rnd(Math.floor(total*0.3),Math.floor(total*0.7));
        const tails=total-heads;
        const bW=Math.round(220*heads/total);
        const svg=`<svg width="260" height="185" viewBox="0 0 260 185" xmlns="http://www.w3.org/2000/svg">

          ${Array.from({length:Math.min(total,30)},(_,i)=>{

            <text x="${22+col*24}" y="${34+row*28}" font-size="8" text-anchor="middle"
              fill="${isH?'#E65100':'#607D8B'}" font-weight="700">${isH?'N':'S'}</text>`;
          }).join('')}
          <rect x="20" y="116" width="220" height="18" rx="9" fill="#ECEFF1"/>
          <rect x="20" y="116" width="${bW}" height="18" rx="9" fill="#FBC02D"/>
          <text x="${20+bW/2}" y="129" font-size="10" font-weight="700" fill="#1C2B3A" text-anchor="middle">N: ${heads}</text>
          <text x="${20+bW+(220-bW)/2}" y="129" font-size="10" font-weight="700" fill="#607D8B" text-anchor="middle">S: ${tails}</text>
          <text x="130" y="152" font-size="11" fill="#1C2B3A" text-anchor="middle">Tần số tương đối mặt ngửa = ___/total</text>

        </svg>`;

        q.svg=svg; return q;
      }

      // ── V1: Xúc xắc N lần – bảng tần số đầy đủ ──────────────────
      if(variant===1){
        const total=pick([24,30,36]);
        const target=rnd(1,6);
        const base=Math.floor(total/6);
        const counts=Array(6).fill(0).map((_,i)=>i===target-1?base+rnd(1,4):Math.max(1,base+rnd(-2,2)));
        const diff=total-counts.reduce((a,b)=>a+b,0);
        counts[target===1?5:0]+=diff;
        const bW=Math.round(200*counts[target-1]/total);
        const headers=['Mặt','1','2','3','4','5','6'];
        const svg=`<svg width="265" height="196" viewBox="0 0 265 196" xmlns="http://www.w3.org/2000/svg">
          <text x="132" y="14" font-size="11" font-weight="700" fill="#1C2B3A" text-anchor="middle">Gieo xúc xắc ${total} lần – kết quả</text>
          <rect x="8" y="22" width="249" height="22" rx="4" fill="#455A64"/>
          ${headers.map((h,i)=>`<text x="${8+i*36+18}" y="37" font-size="10" font-weight="700" fill="white" text-anchor="middle">${h}</text>`).join('')}
          <rect x="8" y="44" width="249" height="22" fill="#FAFAFA" stroke="#DDD" stroke-width="0.5"/>
          ${['Lần',...counts].map((v,i)=>`
            <rect x="${8+i*36}" y="44" width="36" height="22" fill="${i===target?'#FFF9C4':i===0?'#ECEFF1':'#FAFAFA'}" stroke="#EEE" stroke-width="0.5"/>
            <text x="${8+i*36+18}" y="59" font-size="${i===0?9:11}" font-weight="${i===target?'800':'600'}" fill="${i===target?'#E65100':'#1C2B3A'}" text-anchor="middle">${v}</text>
          `).join('')}
          <text x="10" y="84" font-size="11" fill="#1C2B3A" font-weight="700">Tần số mặt ${target}:</text>
          <rect x="10" y="90" width="200" height="14" rx="7" fill="#ECEFF1"/>
          <rect x="10" y="90" width="${bW}" height="14" rx="7" fill="#E65100"/>
          <text x="${10+bW/2}" y="101" font-size="9" font-weight="700" fill="white" text-anchor="middle">${counts[target-1]}/${total}</text>
          <text x="132" y="124" font-size="11" fill="#1C2B3A" text-anchor="middle">Tần số tương đối mặt ${target} = ?/${total}</text>
          <text x="132" y="142" font-size="10" fill="#888" text-anchor="middle">= số lần mặt ${target} / tổng lần gieo</text>
          <text x="132" y="162" font-size="12" font-weight="800" fill="#E65100" text-anchor="middle">= ${counts[target-1]}/${total}</text>
        </svg>`;

      }

      // ── V2: Vòng quay N lần – dự đoán số lần ra màu ─────────────
      if(variant===2){
        const totalSec=pick([4,5,8,10]);
        const greenSec=rnd(1,totalSec-1);
        const spins=pick([20,30,40,50]);
        const expected=Math.round(spins*greenSec/totalSec);
        const r=60,cx=80,cy=82;
        const toRad=a=>a*Math.PI/180;
        const gAngle=360*greenSec/totalSec;
        const x1=cx+r*Math.cos(toRad(-90));
        const y1=cy+r*Math.sin(toRad(-90));
        const x2=cx+r*Math.cos(toRad(-90+gAngle));
        const y2=cy+r*Math.sin(toRad(-90+gAngle));
        const divLines=Array.from({length:totalSec},(_,i)=>{
          const a=toRad(-90+i*360/totalSec);
          return `<line x1="${cx}" y1="${cy}" x2="${Math.round(cx+r*Math.cos(a))}" y2="${Math.round(cy+r*Math.sin(a))}" stroke="white" stroke-width="1.5"/>`;
        }).join('');
        const svg=`<svg width="260" height="185" viewBox="0 0 260 185" xmlns="http://www.w3.org/2000/svg">
          <text x="130" y="14" font-size="11" font-weight="700" fill="#1C2B3A" text-anchor="middle">Vòng quay ${totalSec} ô – quay ${spins} lần</text>
          <circle cx="${cx}" cy="${cy}" r="${r}" fill="#EF5350"/>
          <path d="M${cx},${cy} L${Math.round(x1)},${Math.round(y1)} A${r},${r} 0 ${gAngle>180?1:0},1 ${Math.round(x2)},${Math.round(y2)} Z" fill="#4CAF50"/>
          ${divLines}
          <circle cx="${cx}" cy="${cy}" r="6" fill="white" stroke="#666" stroke-width="1.5"/>
          <polygon points="${cx},${cy-r+6} ${cx-5},${cy-r+20} ${cx+5},${cy-r+20}" fill="#1C2B3A"/>
          <text x="175" y="50" font-size="12" font-weight="700" fill="#4CAF50">Xanh: ${greenSec}/${totalSec} ô</text>
          <text x="175" y="68" font-size="12" font-weight="700" fill="#EF5350">Đỏ: ${totalSec-greenSec}/${totalSec} ô</text>
          <rect x="155" y="84" width="90" height="18" rx="9" fill="#ECEFF1"/>
          <rect x="155" y="84" width="${Math.round(90*greenSec/totalSec)}" height="18" rx="9" fill="#4CAF50"/>
          <text x="175" y="118" font-size="11" fill="#1C2B3A">Quay ${spins} lần</text>
          <text x="175" y="136" font-size="11" fill="#1C2B3A">Dự kiến xanh:</text>
          <text x="175" y="154" font-size="13" font-weight="800" fill="#4CAF50">_____ lần</text>
          <text x="130" y="175" font-size="10" fill="#888" text-anchor="middle">${spins} × ${greenSec}/${totalSec} = ?</text>
        </svg>`;
        const q=fill(`Vòng quay ${totalSec} ô đều: ${greenSec} ô xanh, ${totalSec-greenSec} ô đỏ.\nQuay ${spins} lần → dự kiến ra XANH _____ lần.`,expected,'🎲',`${spins} × ${greenSec}/${totalSec} = ${expected}`);
        q.svg=svg; return q;
      }

      // ── V3: Đọc bảng thực nghiệm – tìm màu xuất hiện nhiều nhất ──
      if(variant===3){
        const colors2=[
          {name:'Đỏ',fill:'#EF5350',n:rnd(8,18)},
          {name:'Xanh',fill:'#42A5F5',n:rnd(8,18)},
          {name:'Vàng',fill:'#FDD835',n:rnd(5,15)},
          {name:'Trắng',fill:'#BDBDBD',n:rnd(4,12)},
        ];
        const total=colors2.reduce((s,c)=>s+c.n,0);
        const maxColor=colors2.reduce((a,b)=>a.n>b.n?a:b);
        const barMax=Math.max(...colors2.map(c=>c.n));
        const svg=`<svg width="265" height="195" viewBox="0 0 265 195" xmlns="http://www.w3.org/2000/svg">
          <text x="132" y="14" font-size="11" font-weight="700" fill="#1C2B3A" text-anchor="middle">Kết quả lấy bi ngẫu nhiên ${total} lần</text>
          ${colors2.map((c,i)=>{
            const bw=Math.round(180*c.n/barMax);
            return `<text x="8" y="${40+i*36}" font-size="11" font-weight="700" fill="${c.fill}">${c.name}</text>
            <rect x="52" y="${26+i*36}" width="${bw}" height="20" rx="4" fill="${c.fill}" opacity="0.85"/>
            <text x="${56+bw}" y="${40+i*36}" font-size="11" font-weight="700" fill="${c.fill}">${c.n} lần</text>`;
          }).join('')}
          <line x1="52" y1="18" x2="52" y2="${26+colors2.length*36}" stroke="#DDD" stroke-width="1"/>
          <text x="132" y="${26+colors2.length*36+18}" font-size="11" fill="#1C2B3A" text-anchor="middle">Màu nào xuất hiện nhiều nhất?</text>
          <text x="132" y="${26+colors2.length*36+35}" font-size="10" fill="#888" text-anchor="middle">Đọc cột dài nhất trong biểu đồ</text>
        </svg>`;
        const wrong=colors2.filter(c=>c!==maxColor).slice(0,3).map(c=>c.name);
        const q=mcq(`Bảng thực nghiệm lấy bi ngẫu nhiên:\n${colors2.map(c=>c.name+': '+c.n+' lần').join(', ')}.\nMàu nào xuất hiện nhiều nhất?`,maxColor.name,wrong,'🎲',`${maxColor.name} xuất hiện ${maxColor.n} lần – nhiều nhất`);
        q.svg=svg; return q;
      }

      // ── V4: Dự đoán từ bảng tần số – 100 lần ────────────────────
      if(variant===4){
        const redP=pick([2,3,4]), totalP=pick([8,10]);
        const bigN=pick([50,80,100]);
        const expN=Math.round(bigN*redP/totalP);
        const barW=Math.round(200*redP/totalP);
        const svg=`<svg width="260" height="185" viewBox="0 0 260 185" xmlns="http://www.w3.org/2000/svg">
          <text x="130" y="14" font-size="11" font-weight="700" fill="#1C2B3A" text-anchor="middle">Thực nghiệm ban đầu – rút ${totalP} lần</text>
          <rect x="15" y="22" width="230" height="38" rx="8" fill="#ECEFF1" stroke="#90A4AE" stroke-width="1.5"/>
          <text x="130" y="38" font-size="12" fill="#1C2B3A" text-anchor="middle">Bi đỏ xuất hiện: <tspan font-weight="800" fill="#EF5350">${redP}/${totalP}</tspan> lần</text>
          <text x="130" y="54" font-size="10" fill="#888" text-anchor="middle">Tần số tương đối = ${redP}/${totalP}</text>
          <rect x="15" y="70" width="230" height="16" rx="8" fill="#ECEFF1"/>
          <rect x="15" y="70" width="${barW}" height="16" rx="8" fill="#EF5350"/>
          <text x="${15+barW/2}" y="82" font-size="10" font-weight="700" fill="white" text-anchor="middle">${redP}/${totalP} = ${Math.round(100*redP/totalP)}%</text>
          <rect x="15" y="100" width="230" height="54" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
          <text x="130" y="120" font-size="11" fill="#1C2B3A" text-anchor="middle">Nếu rút thêm <tspan font-weight="800">${bigN} lần</tspan> nữa</text>
          <text x="130" y="138" font-size="11" fill="#1C2B3A" text-anchor="middle">Dự kiến ra bi đỏ khoảng _____ lần</text>
          <text x="130" y="156" font-size="10" fill="#E65100" text-anchor="middle">${bigN} × ${redP}/${totalP} = ?</text>
          <text x="130" y="174" font-size="10" fill="#888" text-anchor="middle">Dùng tần số tương đối để dự đoán</text>
        </svg>`;
        const q=fill(`Thực nghiệm: ${redP}/${totalP} lần ra bi đỏ.\nNếu rút thêm ${bigN} lần → dự kiến ra bi đỏ _____ lần.`,expN,'🎲',`${bigN} × ${redP}/${totalP} = ${expN}`);
        q.svg=svg; return q;
      }

      // ── V5: So sánh lý thuyết vs thực nghiệm ────────────────────
      const theoryN=pick([3,4,5]), theoryD=pick([8,10,12]);
      const bigN2=pick([40,60,80]);
      const expTheory=Math.round(bigN2*theoryN/theoryD);
      const actualN=expTheory+rnd(-3,4);
      const diff=Math.abs(actualN-expTheory);
      const svg=`<svg width="265" height="192" viewBox="0 0 265 192" xmlns="http://www.w3.org/2000/svg">
        <text x="132" y="14" font-size="11" font-weight="700" fill="#1C2B3A" text-anchor="middle">So sánh: Lý thuyết vs Thực nghiệm</text>
        <rect x="10" y="24" width="245" height="60" rx="10" fill="#E3F2FD" stroke="#1565C0" stroke-width="1.5"/>
        <text x="132" y="44" font-size="11" fill="#1C2B3A" text-anchor="middle">Hộp ${theoryN}/${theoryD} bi đỏ · Rút có hoàn lại ${bigN2} lần</text>
        <text x="132" y="62" font-size="11" fill="#1565C0" text-anchor="middle">Lý thuyết: ${bigN2}×${theoryN}/${theoryD} = <tspan font-weight="800">${expTheory}</tspan> lần đỏ</text>
        <text x="132" y="78" font-size="10" fill="#888" text-anchor="middle">(dự đoán theo công thức)</text>
        <rect x="10" y="96" width="245" height="60" rx="10" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
        <text x="132" y="116" font-size="11" fill="#1C2B3A" text-anchor="middle">Thực nghiệm: đếm thực tế</text>
        <text x="132" y="134" font-size="13" font-weight="800" fill="#E65100" text-anchor="middle">Kết quả đo được: ${actualN} lần đỏ</text>
        <text x="132" y="150" font-size="10" fill="#888" text-anchor="middle">(ghi nhận từ thực tế)</text>
        <text x="132" y="172" font-size="11" fill="#1C2B3A" text-anchor="middle">Chênh lệch = |${actualN} − ${expTheory}| = ${diff} lần</text>
        <text x="132" y="188" font-size="10" fill="#888" text-anchor="middle">Thực nghiệm càng nhiều lần → càng gần lý thuyết</text>
      </svg>`;
      const q=fill(`Hộp có ${theoryN}/${theoryD} bi đỏ. Rút ${bigN2} lần.\nLý thuyết dự đoán _____ lần đỏ.`,expTheory,'🎲',`${bigN2} × ${theoryN}/${theoryD} = ${expTheory}`);
      q.svg=svg; return q;
    }
  }
};

// ============================================================
//  STATE & LOGIC
// ============================================================
const state = {
  currentChapter:null, currentTopic:null, level:'easy',
  qIndex:0, correct:0, wrong:0, streak:0, totalQ:10, answered:false
};

function generateQuestion(key, level){ return (GEN[key]||GEN['addSub1000'])[level](); }

function initHome(){
  const grid=document.getElementById('chapters-grid');
  grid.innerHTML='';
  CHAPTERS.forEach(ch=>{
    const card=document.createElement('div');
    card.className=`chapter-card ${ch.color}`;
    card.innerHTML=`<div class="ch-icon">${ch.icon}</div>
      <div class="ch-num">${ch.num}</div>
      <div class="ch-title">${ch.title}</div>
      <div class="ch-desc">${ch.desc}</div>
      <div class="ch-topics">${ch.tags.map(t=>`<span class="ch-tag">${t}</span>`).join('')}</div>`;
    card.onclick=()=>startChapter(ch);
    grid.appendChild(card);
  });
}

const TOPIC_COLORS={
  c1:['#E3F2FD','#0D47A1','#1565C0'],
  c2:['#E8F5E9','#1B5E20','#2E7D32'],
  c3:['#FFEBEE','#B71C1C','#C62828'],
  c4:['#F3E5F5','#4A148C','#6A1B9A'],
  c5:['#FFF3E0','#BF360C','#E65100'],
  c6:['#E0F2F1','#004D40','#00695C'],
  c7:['#F1F8E9','#33691E','#558B2F'],
  c8:['#FCE4EC','#880E4F','#AD1457'],
  c9:['#EDE7F6','#311B92','#4527A0'],
};

function getTopicActiveStyle(colorClass){
  const c=TOPIC_COLORS[colorClass]||['#EEE','#333','#555'];
  return `background:${c[0]};color:${c[1]};border-color:${c[2]};`;
}

function startChapter(ch){
  state.currentChapter=ch;
  state.currentTopic=ch.topics[0];
  state.level='easy';
  resetScores();
  document.getElementById('prac-chapter-title').textContent=`${ch.num}: ${ch.title}`;
  document.getElementById('prac-chapter-desc').textContent=ch.desc;

  const row=document.getElementById('topic-row');
  row.innerHTML='';
  ch.topics.forEach((t,i)=>{
    const pill=document.createElement('button');
    pill.className='topic-pill'+(i===0?' active-topic':'');
    pill.textContent=t.label;
    if(i===0) pill.style.cssText=getTopicActiveStyle(ch.color);
    pill.onclick=()=>{
      document.querySelectorAll('.topic-pill').forEach(p=>{p.classList.remove('active-topic');p.style.cssText='';});
      pill.classList.add('active-topic');
      pill.style.cssText=getTopicActiveStyle(ch.color);
      state.currentTopic=t; state.qIndex=0; resetScores(); generateNextQuestion();
    };
    row.appendChild(pill);
  });

  document.querySelectorAll('.level-btn').forEach(b=>b.className='level-btn');
  document.getElementById('btn-easy').classList.add('active-easy');
  showScreen('screen-practice');
  generateNextQuestion();
}

function setLevel(level,btn){
  state.level=level; state.qIndex=0; resetScores();
  document.querySelectorAll('.level-btn').forEach(b=>b.className='level-btn');
  btn.classList.add(`active-${level}`);
  generateNextQuestion();
}

function resetScores(){
  state.correct=0; state.wrong=0; state.streak=0; updateScoreBar();
}

function generateNextQuestion(){
  if(state.qIndex>=state.totalQ){ showResult(); return; }
  state.answered=false;
  renderQuestion(generateQuestion(state.currentTopic.key, state.level));
}

function renderQuestion(q){
  document.getElementById('q-icon').textContent=q.icon||'🔢';
  document.getElementById('q-text').textContent=q.question;
  document.getElementById('q-hint').textContent=q.hint?`💡 ${q.hint}`:'';
  document.getElementById('q-progress').textContent=`Câu ${state.qIndex+1} / ${state.totalQ}`;
  document.getElementById('feedback').className='feedback';
  document.getElementById('next-btn').className='next-btn';

  // Show/hide illustration
  const illDiv=document.getElementById('q-illustration');
  if(q.svg){
    illDiv.innerHTML=q.svg;
    illDiv.style.display='flex';
  } else {
    illDiv.innerHTML='';
    illDiv.style.display='none';
  }

  const area=document.getElementById('answer-area');
  area.innerHTML='';

  if(q.type==='mcq'){
    const grid=document.createElement('div');
    grid.className='answers-grid';
    q.options.forEach(opt=>{
      const btn=document.createElement('button');
      btn.className='ans-btn';
      btn.textContent=opt;
      btn.onclick=()=>checkMCQ(btn,opt,q.correct,grid);
      grid.appendChild(btn);
    });
    area.appendChild(grid);
  } else {
    const wrap=document.createElement('div');
    wrap.className='fill-wrap';
    const inp=document.createElement('input');
    inp.type='number'; inp.className='fill-input'; inp.placeholder='?'; inp.id='fill-inp';
    inp.onkeydown=e=>{if(e.key==='Enter') checkFill(q.correct);};
    const btn=document.createElement('button');
    btn.className='check-btn'; btn.textContent='Kiểm tra ✓'; btn.id='check-btn';
    btn.onclick=()=>checkFill(q.correct);
    wrap.appendChild(inp); wrap.appendChild(btn);
    area.appendChild(wrap);
    setTimeout(()=>inp.focus(),100);
  }
}

function checkMCQ(clickedBtn,selected,correct,grid){
  if(state.answered) return;
  state.answered=true;
  const ok=String(selected)===String(correct);
  grid.querySelectorAll('.ans-btn').forEach(b=>{
    b.disabled=true;
    if(String(b.textContent)===String(correct)) b.classList.add('correct');
  });
  if(!ok) clickedBtn.classList.add('wrong');
  showFeedback(ok,correct);
}

function checkFill(correct){
  if(state.answered) return;
  const inp=document.getElementById('fill-inp');
  const val=inp.value.trim();
  if(!val) return;
  state.answered=true;
  const ok=String(val)===String(correct);
  inp.classList.add(ok?'correct-inp':'wrong-inp');
  inp.disabled=true;
  document.getElementById('check-btn').disabled=true;
  showFeedback(ok,correct);
}

function showFeedback(ok,correct){
  const fb=document.getElementById('feedback');
  if(ok){
    state.correct++; state.streak++;
    fb.className='feedback correct show';
    fb.textContent=pick(['🎉 Xuất sắc!','✅ Chính xác!','🌟 Tuyệt vời!','👏 Giỏi lắm!','🏆 Đúng rồi!','🎯 Bắn trúng đích!']);
  } else {
    state.wrong++; state.streak=0;
    fb.className='feedback wrong show';
    fb.textContent=`❌ Chưa đúng! Đáp án đúng là: ${correct}`;
  }
  updateScoreBar();
  document.getElementById('next-btn').className='next-btn show';
}

function updateScoreBar(){
  document.getElementById('sc-correct').textContent=state.correct;
  document.getElementById('sc-wrong').textContent=state.wrong;
  document.getElementById('sc-streak').textContent=state.streak;
}

function nextQuestion(){ state.qIndex++; generateNextQuestion(); }

function showResult(){
  const pct=Math.round(state.correct/state.totalQ*100);
  let emoji,title,stars;
  if(pct>=90){emoji='🏆';title='Xuất sắc! Bạn là ngôi sao!';stars='⭐⭐⭐';}
  else if(pct>=70){emoji='🎉';title='Giỏi lắm! Tiếp tục cố gắng!';stars='⭐⭐';}
  else if(pct>=50){emoji='😊';title='Tốt! Ôn thêm để giỏi hơn nhé!';stars='⭐';}
  else{emoji='💪';title='Cố lên! Thử lại nhé!';stars='✨';}
  document.getElementById('res-emoji').textContent=emoji;
  document.getElementById('res-title').textContent=title;
  document.getElementById('res-stars').textContent=stars;
  document.getElementById('res-score').textContent=`${state.correct}/${state.totalQ}`;
  document.getElementById('res-sub').textContent=`Trả lời đúng ${state.correct} câu (${pct}%) — Chuỗi đúng cao nhất: ${state.streak}`;
  showScreen('screen-result');
}

function retryChapter(){ startChapter(state.currentChapter); }

function goHarder(){
  const lvls=['easy','medium','hard'];
  const idx=lvls.indexOf(state.level);
  if(idx<2){
    state.level=lvls[idx+1];
    document.querySelectorAll('.level-btn').forEach(b=>b.className='level-btn');
    document.getElementById(['btn-easy','btn-medium','btn-hard'][idx+1]).classList.add(`active-${lvls[idx+1]}`);
  }
  state.qIndex=0; resetScores();
  showScreen('screen-practice'); generateNextQuestion();
}

function goHome(){ showScreen('screen-home'); }

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0,0);
}

initHome();
</script>
<script src="js/auth.js"></script>
