<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Đăng nhập · HocLab</title>
<link rel="icon" href="../assets/images/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="../css/variables.css">
<link rel="stylesheet" href="../css/base.css">
<link rel="stylesheet" href="../css/components.css">
<link rel="stylesheet" href="../css/nav.css">
<link rel="stylesheet" href="../css/auth.css">
</head>
<body>
<a href="#main" class="hv-skip-link">Bỏ qua đến nội dung chính</a>
<div id="site-header"></div>

<main id="main" class="hv-auth-wrap">
  <div class="hv-auth-card">
    <div class="hv-auth-icon">🔑</div>
    <h1>Đăng nhập</h1>
    <p class="hv-auth-sub">Chào mừng bạn quay lại HocLab.</p>

    <div class="hv-auth-banner"></div>

    <form id="form-login" novalidate>
      <div class="hv-auth-form-error"></div>

      <div class="hv-field">
        <label class="hv-label" for="login-identifier">Tên đăng nhập hoặc Email</label>
        <input class="hv-input" type="text" id="login-identifier" name="identifier" autocomplete="username" required>
      </div>

      <div class="hv-field">
        <label class="hv-label" for="login-password">Mật khẩu</label>
        <input class="hv-input" type="password" id="login-password" name="password" autocomplete="current-password" required>
      </div>

      <button type="submit" class="hv-btn hv-btn-primary hv-btn-block">Đăng nhập</button>
    </form>

    <p class="hv-auth-switch">Chưa có tài khoản? <a href="register.html" data-auth-switch>Đăng ký ngay</a></p>

    <div class="hv-admin-hint">Tài khoản quản trị demo: <strong>admin</strong> / <strong>Admin@123</strong></div>
  </div>
</main>

<div id="site-footer"></div>

<script>window.HV_BASE = "../";</script>
<script src="../js/config/courses.config.js"></script>
<script src="../js/core/utils.js"></script>
<script src="../js/core/storage.js"></script>
<script src="../js/core/auth.js"></script>
<script src="../js/core/purchases.js"></script>
<script src="../js/ui/nav.js"></script>
<script src="../js/ui/feedback.js"></script>
<script src="../js/pages/auth-pages.js"></script>
</body>
</html>
