<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Không tìm thấy trang – Học Vui</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:linear-gradient(135deg,#0b1f3a 0%, #1565C0 55%, #38bdf8 100%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;
    text-align:center;padding:24px;
  }
  .box{max-width:420px;}
  .emoji{font-size:4rem;margin-bottom:14px;}
  h1{color:#fff;font-size:1.6rem;font-weight:800;margin-bottom:10px;}
  p{color:rgba(255,255,255,0.85);font-size:0.95rem;margin-bottom:26px;}
  a{display:inline-flex;align-items:center;gap:8px;background:#fff;color:#0b1f3a;padding:13px 24px;border-radius:999px;font-weight:800;text-decoration:none;font-size:0.9rem;transition:all .15s;}
  a:hover{transform:translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,0.25);}
</style>
</head>
<body>
  <div class="box">
    <div class="emoji">🧭</div>
    <h1>Không tìm thấy trang này</h1>
    <p>Trang bạn tìm không tồn tại hoặc đã được di chuyển. Hãy quay lại trang chủ để tiếp tục học nhé!</p>
    <a href="index.html">🏠 Về trang chủ</a>
  </div>
  <script src="js/auth.js"></script>
</body>
</html>
