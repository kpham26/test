<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Vui Học Toán 3 — Đấu Trường Trí Tuệ">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="60%" stop-color="#16294A"/>
      <stop offset="100%" stop-color="#3a2a10"/>
    </linearGradient>
    <radialGradient id="glow2" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#FFB627" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#FFB627" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFE9A8"/>
      <stop offset="100%" stop-color="#F2C94C"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#bg2)"/>
  <circle cx="200" cy="90" r="150" fill="url(#glow2)"/>

  <!-- radiating "arena" lines -->
  <g stroke="#FFB627" stroke-opacity="0.14" stroke-width="1.5">
    <line x1="200" y1="118" x2="60" y2="0"/>
    <line x1="200" y1="118" x2="150" y2="0"/>
    <line x1="200" y1="118" x2="250" y2="0"/>
    <line x1="200" y1="118" x2="340" y2="0"/>
    <line x1="200" y1="118" x2="20" y2="250"/>
    <line x1="200" y1="118" x2="380" y2="250"/>
  </g>

  <!-- floating glyphs -->
  <g fill="#FFFFFF" fill-opacity="0.18" font-family="Georgia, serif" font-weight="700">
    <text x="36" y="65" font-size="28">30</text>
    <text x="322" y="70" font-size="26">🔥</text>
    <text x="44" y="205" font-size="26">⏱</text>
  </g>

  <!-- central medal badge -->
  <g transform="translate(200,118)">
    <circle r="56" fill="none" stroke="#FFB627" stroke-opacity="0.6" stroke-width="2" stroke-dasharray="4 6"/>
    <circle r="46" fill="url(#card2)"/>
    <text x="0" y="17" font-size="46" text-anchor="middle" font-family="Arial, sans-serif">🏆</text>
  </g>

  <g transform="translate(200,198)">
    <rect x="98" y="-14" width="0" height="0"/>
    <rect x="-88" y="-14" width="176" height="28" rx="14" fill="#0A1628" fill-opacity="0.55"/>
    <text x="0" y="6" font-size="11.5" letter-spacing="1.2" text-anchor="middle" fill="#FFE9A8" font-family="Arial, sans-serif" font-weight="700">ĐẤU TRƯỜNG · TOÁN 3</text>
  </g>
</svg>
