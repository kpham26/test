<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Toán Lớp 3 – Kết Nối Tri Thức">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="55%" stop-color="#123262"/>
      <stop offset="100%" stop-color="#1565C0"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#42A5F5" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#42A5F5" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#bg1)"/>
  <circle cx="200" cy="95" r="150" fill="url(#glow1)"/>

  <!-- faint grid, echoing graph/notebook paper -->
  <g stroke="#FFFFFF" stroke-opacity="0.07" stroke-width="1">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="80" y1="0" x2="80" y2="250"/>
    <line x1="160" y1="0" x2="160" y2="250"/>
    <line x1="240" y1="0" x2="240" y2="250"/>
    <line x1="320" y1="0" x2="320" y2="250"/>
  </g>

  <!-- floating math glyphs -->
  <g fill="#FFFFFF" fill-opacity="0.16" font-family="Georgia, serif" font-weight="700">
    <text x="34" y="70" font-size="34">+</text>
    <text x="330" y="60" font-size="30">÷</text>
    <text x="40" y="200" font-size="30">×</text>
    <text x="315" y="205" font-size="34">−</text>
  </g>

  <!-- central badge -->
  <g transform="translate(200,118)">
    <circle r="54" fill="url(#card1)"/>
    <circle r="54" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2"/>
    <text x="0" y="18" font-size="52" text-anchor="middle" font-family="Arial, sans-serif">📐</text>
  </g>

  <!-- badge label -->
  <g transform="translate(200,196)">
    <rect x="-72" y="-14" width="144" height="28" rx="14" fill="#0A1628" fill-opacity="0.55"/>
    <text x="0" y="6" font-size="12" letter-spacing="1.5" text-anchor="middle" fill="#FFE9A8" font-family="Arial, sans-serif" font-weight="700">TOÁN · LỚP 3</text>
  </g>
</svg>
