<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" role="img" aria-label="Đấu Trường Anh Ngữ — Lớp 3">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A1628"/>
      <stop offset="55%" stop-color="#3a2412"/>
      <stop offset="100%" stop-color="#D97A2B"/>
    </linearGradient>
    <radialGradient id="glow3" cx="50%" cy="38%" r="62%">
      <stop offset="0%" stop-color="#F2994A" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#F2994A" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#FBF6EC"/>
    </linearGradient>
  </defs>

  <rect width="400" height="250" fill="url(#bg3)"/>
  <circle cx="200" cy="92" r="150" fill="url(#glow3)"/>

  <!-- notebook lines, echoing the lesson's paper background -->
  <g stroke="#FBF6EC" stroke-opacity="0.10" stroke-width="1">
    <line x1="0" y1="55" x2="400" y2="55"/>
    <line x1="0" y1="95" x2="400" y2="95"/>
    <line x1="0" y1="135" x2="400" y2="135"/>
    <line x1="0" y1="175" x2="400" y2="175"/>
    <line x1="0" y1="215" x2="400" y2="215"/>
  </g>

  <!-- floating letters -->
  <g fill="#FFFFFF" fill-opacity="0.18" font-family="Georgia, serif" font-style="italic" font-weight="700">
    <text x="40" y="70" font-size="34">a</text>
    <text x="326" y="66" font-size="30">an</text>
    <text x="42" y="205" font-size="30">the</text>
  </g>

  <g transform="translate(200,118)">
    <circle r="54" fill="url(#card3)"/>
    <circle r="54" fill="none" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="2"/>
    <text x="0" y="17" font-size="48" text-anchor="middle" font-family="Arial, sans-serif">🔤</text>
  </g>

  <g transform="translate(200,196)">
    <rect x="-92" y="-14" width="184" height="28" rx="14" fill="#0A1628" fill-opacity="0.55"/>
    <text x="0" y="6" font-size="11.5" letter-spacing="1.2" text-anchor="middle" fill="#FFE9A8" font-family="Arial, sans-serif" font-weight="700">TIẾNG ANH · LỚP 3</text>
  </g>
</svg>
